<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekarat — Capacity Planner</title>
<style>
:root {
  --bg:  #f5f6f8;
  --bg2: #ffffff;
  --bg3: #f0f2f5;
  --bg4: #e8eaed;
  --card:#ffffff;
  --bord: rgba(0,0,0,0.08);
  --bord2:rgba(0,0,0,0.15);
  --txt:  #1a1d23;
  --txt2: #5a6070;
  --txt3: #9098a8;
  --amber:#c07800;
  --amber2:#e09020;
  --red:  #c0392b;
  --red2: #e74c3c;
  --green:#1a7a4a;
  --green2:#27ae60;
  --blue: #1a5fc0;
  --purple:#6c3da8;
  --mono:'Courier New',monospace;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
  --shadow-md:0 2px 10px rgba(0,0,0,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:52px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bord);box-shadow:var(--shadow)}
.logo{font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--amber)}
.nav-tabs{display:flex;gap:2px}
.nav-tab{font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;color:var(--txt2);background:transparent;border:none;transition:all .15s;font-family:inherit}
.nav-tab:hover{color:var(--txt);background:var(--bg3)}
.nav-tab.active{color:var(--amber);background:#fff8ee;font-weight:600;border:1px solid rgba(192,120,0,.2)}
.topbar-right{font-size:11px;color:var(--txt3);font-family:var(--mono)}

/* ── Layout ── */
.body{flex:1;overflow:hidden;display:flex}
.panel{flex:1;overflow-y:auto;padding:1.25rem 1.5rem}
.panel.split-left{border-right:1px solid var(--bord);max-width:420px;flex-shrink:0}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1.125rem 1.25rem;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--txt3);text-transform:uppercase;margin-bottom:12px}
.mc{background:var(--bg3);border-radius:10px;padding:10px 12px;border:1px solid var(--bord)}
.mc-label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.mc-val{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1;color:var(--txt)}
.mc-sub{font-size:10px;color:var(--txt3);margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}

/* ── Inputs ── */
.field{margin-bottom:12px}
.field-label{font-size:11px;color:var(--txt2);margin-bottom:5px;display:block;font-weight:500}
.field input,.field select,.field textarea{
  width:100%;font-size:13px;padding:8px 12px;
  background:#fff;border:1px solid var(--bord2);border-radius:8px;
  color:var(--txt);font-family:inherit;outline:none;transition:border-color .15s;
}
.field input:focus,.field select:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(192,120,0,.1)}
.field select option{background:#fff}
.field-hint{font-size:10px;color:var(--txt3);margin-top:4px}

/* ── Buttons ── */
button{border:1px solid var(--bord2);background:#fff;color:var(--txt);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;transition:all .15s;font-family:inherit}
button:hover{background:var(--bg3);border-color:var(--bord2)}
.btn-primary{background:var(--amber);border-color:var(--amber);color:#fff;font-weight:700}
.btn-primary:hover{background:var(--amber2);border-color:var(--amber2);color:#fff}
.btn-green{background:var(--green);border-color:var(--green);color:#fff;font-weight:700}
.btn-green:hover{background:var(--green2);color:#fff}
.btn-ghost{border-color:transparent;color:var(--txt2);background:transparent}
.btn-ghost:hover{color:var(--txt);background:var(--bg3)}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:6px}

/* ── WC Load bars ── */
.wc-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bord);font-size:12px}
.wc-row:last-child{border-bottom:none}
.wc-code{width:54px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--amber);flex-shrink:0}
.wc-name{width:100px;font-size:10px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.wc-stack{flex:1;position:relative;height:10px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--bord)}
.wc-bar-committed{position:absolute;left:0;top:0;height:100%;border-radius:3px;transition:width .6s ease}
.wc-bar-new{position:absolute;top:0;height:100%;border-radius:0 3px 3px 0;transition:all .6s ease;opacity:.85}
.wc-pct{width:36px;text-align:right;font-family:var(--mono);font-size:10px;flex-shrink:0}
.wc-free{width:38px;text-align:right;font-size:10px;color:var(--txt3);flex-shrink:0}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;flex-shrink:0}
.b-ok{background:#e6f7ee;color:#1a7a4a;border:1px solid rgba(26,122,74,.2)}
.b-warn{background:#fff8e6;color:#c07800;border:1px solid rgba(192,120,0,.2)}
.b-red{background:#fcecea;color:#c0392b;border:1px solid rgba(192,57,43,.2)}
.b-ot{background:#f0eafa;color:#6c3da8;border:1px solid rgba(108,61,168,.2)}

/* ── Decision output ── */
.decision-wrap{border-radius:12px;padding:1.25rem;margin-bottom:12px;border:1.5px solid}
.dec-accept{background:#f0faf5;border-color:rgba(26,122,74,.3)}
.dec-ot{background:#fffbf0;border-color:rgba(192,120,0,.3)}
.dec-reject{background:#fef5f5;border-color:rgba(192,57,43,.3)}
.dec-icon{font-size:24px;margin-bottom:6px}
.dec-title{font-size:15px;font-weight:700;margin-bottom:4px}
.dec-sub{font-size:12px;color:var(--txt2);margin-bottom:12px}
.dec-detail{font-size:12px;color:var(--txt2);line-height:1.8}
.dec-detail strong{color:var(--txt);font-weight:600}
.dec-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

/* ── Scenario cards ── */
.scenario{background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--bord)}
.scenario.best{border-color:rgba(26,122,74,.4);background:#f5fbf7}
.sc-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sc-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.sc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.sc-cell{text-align:center}
.sc-val{font-size:14px;font-weight:700;font-family:var(--mono)}
.sc-lbl{font-size:9px;color:var(--txt3);margin-top:2px}

/* ── Op timeline ── */
.op-timeline{margin-top:8px}
.op-line{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.op-line:last-child{border-bottom:none}
.op-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.op-wc{font-family:var(--mono);font-size:10px;color:var(--amber);width:52px;flex-shrink:0}
.op-name{flex:1;color:var(--txt2)}
.op-hrs{font-family:var(--mono);font-size:10px;color:var(--txt);width:40px;text-align:right}
.op-bottleneck{color:var(--red);font-weight:700}

/* ── Alert item ── */
.alert-item{display:flex;gap:10px;padding:10px;background:rgba(224,90,78,.06);border:1px solid rgba(224,90,78,.15);border-radius:8px;margin-bottom:8px;font-size:12px}
.alert-item.warn{background:rgba(224,156,42,.06);border-color:rgba(224,156,42,.15)}

/* ── Divider ── */
.divider{height:1px;background:var(--bord);margin:12px 0}

/* ── Progress ring ── */
.load-ring{position:relative;width:56px;height:56px;flex-shrink:0}
.load-ring svg{transform:rotate(-90deg)}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono)}

/* ── Accepted order list ── */
.accepted-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--bord);font-size:12px}
.accepted-row:last-child{border-bottom:none}
.ar-order{font-family:var(--mono);font-size:10px;color:var(--amber);width:72px;flex-shrink:0}
.ar-mat{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt2)}
.ar-hrs{font-family:var(--mono);color:var(--txt);width:40px;text-align:right;flex-shrink:0}
.ar-dead{font-size:10px;color:var(--txt3);width:60px;text-align:right;flex-shrink:0}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg3)} ::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px}

/* ── Theme switcher ── */
.theme-picker{display:flex;align-items:center;gap:6px}
.theme-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.theme-dot:hover{transform:scale(1.2)}
.theme-dot.active{border-color:var(--txt);transform:scale(1.15)}
.theme-label{font-size:10px;color:var(--txt3);margin-right:4px}

/* ── Dark theme overrides (applied via class on <html>) ── */
html.theme-dark{
  --bg:#0f1117; --bg2:#181c27; --bg3:#1e2333; --bg4:#232840;
  --card:#1e2333; --bord:rgba(255,255,255,0.07); --bord2:rgba(255,255,255,0.14);
  --txt:#e8e6de; --txt2:#8a8880; --txt3:#4a4845;
  --amber:#e09c2a; --amber2:#f5b940; --red:#e05a4e; --green:#4caf7d; --blue:#5b8ef0; --purple:#9b7fe8;
  --shadow:0 1px 4px rgba(0,0,0,0.3); --shadow-md:0 2px 10px rgba(0,0,0,0.4);
}
html.theme-dark button{background:var(--bg3);color:var(--txt);border-color:var(--bord2)}
html.theme-dark button:hover{background:var(--bg4)}
html.theme-dark .btn-primary{background:var(--amber);color:#000}
html.theme-dark .btn-green{background:var(--green);color:#000}
html.theme-dark .btn-ghost{background:transparent;color:var(--txt2)}
html.theme-dark .field input,html.theme-dark .field select{background:var(--bg3);color:var(--txt)}
html.theme-dark .b-ok{background:rgba(76,175,125,.15);color:var(--green);border-color:rgba(76,175,125,.3)}
html.theme-dark .b-warn{background:rgba(224,156,42,.15);color:var(--amber);border-color:rgba(224,156,42,.3)}
html.theme-dark .b-red{background:rgba(224,90,78,.15);color:var(--red);border-color:rgba(224,90,78,.3)}
html.theme-dark .scenario.best{background:rgba(76,175,125,.07);border-color:rgba(76,175,125,.3)}
html.theme-dark .dec-accept{background:rgba(76,175,125,.07);border-color:rgba(76,175,125,.3)}
html.theme-dark .dec-ot{background:rgba(224,156,42,.07);border-color:rgba(224,156,42,.3)}
html.theme-dark .dec-reject{background:rgba(224,90,78,.07);border-color:rgba(224,90,78,.3)}
html.theme-dark .nav-tab.active{background:rgba(224,156,42,.1);border-color:rgba(224,156,42,.2)}

/* Blue theme */
html.theme-blue{
  --bg:#eef3fb; --bg2:#ffffff; --bg3:#dde8f7; --bg4:#ccdaf4;
  --card:#ffffff; --bord:rgba(26,95,192,0.12); --bord2:rgba(26,95,192,0.22);
  --txt:#0d1f3c; --txt2:#3a5280; --txt3:#7a90b8;
  --amber:#1a5fc0; --amber2:#2a72e0; --red:#b03020; --green:#1a6a3a; --blue:#1a5fc0; --purple:#5030a0;
  --shadow:0 1px 4px rgba(26,95,192,0.1); --shadow-md:0 2px 10px rgba(26,95,192,0.15);
}
html.theme-blue .nav-tab.active{background:#dde8f7;border-color:rgba(26,95,192,.3);color:#1a5fc0}
html.theme-blue .b-ok{background:#e0f4ea;color:#1a6a3a;border-color:rgba(26,106,58,.2)}
html.theme-blue .b-warn{background:#fff4e0;color:#b06000;border-color:rgba(176,96,0,.2)}
html.theme-blue .b-red{background:#fce8e6;color:#b03020;border-color:rgba(176,48,32,.2)}
html.theme-blue .scenario.best{background:#d8eefa;border-color:rgba(26,95,192,.3)}
html.theme-blue .dec-accept{background:#e8f8ef;border-color:rgba(26,106,58,.3)}
html.theme-blue .dec-ot{background:#fffbe8;border-color:rgba(176,96,0,.3)}
html.theme-blue .dec-reject{background:#feeeec;border-color:rgba(176,48,32,.3)}

/* Green theme */
html.theme-green{
  --bg:#eef7f2; --bg2:#ffffff; --bg3:#ddf0e6; --bg4:#cce7d8;
  --card:#ffffff; --bord:rgba(26,122,74,0.12); --bord2:rgba(26,122,74,0.22);
  --txt:#0d2a1a; --txt2:#2d6644; --txt3:#6a9878;
  --amber:#1a7a4a; --amber2:#22954a; --red:#b03020; --green:#1a7a4a; --blue:#1a5fc0; --purple:#5030a0;
  --shadow:0 1px 4px rgba(26,122,74,0.1); --shadow-md:0 2px 10px rgba(26,122,74,0.15);
}
html.theme-green .nav-tab.active{background:#d0ecda;border-color:rgba(26,122,74,.3);color:#1a7a4a}
html.theme-green .b-ok{background:#d8f4e5;color:#1a7a4a;border-color:rgba(26,122,74,.25)}
html.theme-green .b-warn{background:#fff4e0;color:#b06000;border-color:rgba(176,96,0,.2)}
html.theme-green .b-red{background:#fce8e6;color:#b03020;border-color:rgba(176,48,32,.2)}
html.theme-green .scenario.best{background:#d8f4e5;border-color:rgba(26,122,74,.3)}
html.theme-green .dec-accept{background:#d8f4e5;border-color:rgba(26,122,74,.3)}
html.theme-green .dec-ot{background:#fffbe8;border-color:rgba(176,96,0,.3)}
html.theme-green .dec-reject{background:#feeeec;border-color:rgba(176,48,32,.3)}

/* Warm theme */
html.theme-warm{
  --bg:#faf7f2; --bg2:#ffffff; --bg3:#f3ede2; --bg4:#eae0cc;
  --card:#ffffff; --bord:rgba(160,100,40,0.12); --bord2:rgba(160,100,40,0.22);
  --txt:#2a1a08; --txt2:#7a5030; --txt3:#b09060;
  --amber:#a06020; --amber2:#c07830; --red:#a03020; --green:#406020; --blue:#204880; --purple:#602880;
  --shadow:0 1px 4px rgba(160,100,40,0.1); --shadow-md:0 2px 10px rgba(160,100,40,0.15);
}
html.theme-warm .nav-tab.active{background:#eedfc8;border-color:rgba(160,100,40,.3);color:#a06020}
html.theme-warm .b-ok{background:#e8f4d8;color:#406020;border-color:rgba(64,96,32,.2)}
html.theme-warm .b-warn{background:#fff4e0;color:#a06020;border-color:rgba(160,96,32,.2)}
html.theme-warm .b-red{background:#fce8e6;color:#a03020;border-color:rgba(160,48,32,.2)}
html.theme-warm .scenario.best{background:#e8f4d8;border-color:rgba(64,96,32,.3)}
html.theme-warm .dec-accept{background:#e8f4d8;border-color:rgba(64,96,32,.3)}
html.theme-warm .dec-ot{background:#fff8ee;border-color:rgba(160,96,32,.3)}
html.theme-warm .dec-reject{background:#feeeec;border-color:rgba(160,48,32,.3)}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">EKARAT · CAPACITY PLANNER</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setTab('simulate')">🧮 จำลองรับ Order</button>
    <button class="nav-tab" onclick="setTab('import')" style="border:1px solid rgba(76,175,125,.35);color:var(--green)">📥 Import Excel</button>
    <button class="nav-tab" onclick="setTab('orders')">📋 SAP Orders</button>
    <button class="nav-tab" onclick="setTab('catalog')">📚 Catalog</button>
    <button class="nav-tab" onclick="setTab('employees')">👥 พนักงาน</button>
    <button class="nav-tab" onclick="setTab('timedash')">⏱ เวลาต่อแผนก</button>
    <button class="nav-tab" onclick="setTab('dept')">🏭 EE แผนก</button>
    <button class="nav-tab" onclick="setTab('load')">📊 Load Board</button>
    <button class="nav-tab" onclick="setTab('gantt')">📈 Gantt Chart</button>
    <button class="nav-tab" onclick="setTab('plan')">📋 แผนผลิต</button>
    <button class="nav-tab" onclick="setTab('capacity')">⚡ Capacity</button>
    <button class="nav-tab" onclick="setTab('itemdecode')">🔑 Item Code</button>
    <button class="nav-tab" onclick="setTab('transcode')">🔢 EN-T-001</button>
    <button class="nav-tab" onclick="setTab('calendar')">📅 ปฏิทิน</button>
    <button class="nav-tab" onclick="setTab('settings')">⚙ ตั้งค่า WC</button>
    <button class="nav-tab" onclick="exportPDF()" style="border:1px solid rgba(91,142,240,.3);color:var(--blue)">📄 Export PDF</button>
  </div>
    <div style="font-size:10px;color:var(--txt3);font-family:var(--mono)" id="clock">--:--:--</div>
  <div class="theme-picker">
    <span class="theme-label">Theme:</span>
    <div class="theme-dot active" style="background:#f5f6f8;border-color:#888" title="Light" onclick="setTheme('light',this)"></div>
    <div class="theme-dot" style="background:#181c27" title="Dark" onclick="setTheme('dark',this)"></div>
    <div class="theme-dot" style="background:#1a5fc0" title="Blue" onclick="setTheme('blue',this)"></div>
    <div class="theme-dot" style="background:#1a7a4a" title="Green" onclick="setTheme('green',this)"></div>
    <div class="theme-dot" style="background:#c07830" title="Warm" onclick="setTheme('warm',this)"></div>
  </div>
</div>

<div class="body" id="body-root"></div>

<script>

// CORE DATA
// ═══════════════════════════════════════════════════════════════

  EE3403:{ name:'ประกอบ Cast Resin',        workers:4, hrs:8, ot:4, sat_hrs:4, sat_ot:0, eff:34 },
  EE3501:{ name:'ทำสกรู/กลึง',             workers:3, hrs:8, ot:2, sat_hrs:4, sat_ot:0, eff:74 },

async function apiCall(endpoint, options = {}) {
  try {
    const res = await fetch(`${BACKEND_URL}${endpoint}`, {
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
      ...options,
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    backendAvailable = true;
    if (res.status === 204) return true;
    return await res.json();
  } catch (err) {
    backendAvailable = false;
    console.warn(`Backend unavailable (${err.message}); using local data`);
    return null;
  }
}

// จ–ศ = 5 วัน, เสาร์ = 1 วัน (แยกชั่วโมง)
const WEEKDAYS = 5;
const SAT_DAYS = 1;

// ═══════════════════════════════════════════════════════════════
// CAPACITY CALCULATIONS
// ═══════════════════════════════════════════════════════════════

function getWeeklyCapacity(wc) {
  const cfg = WC_CONFIG[wc] || {workers:3, hrs:8, ot:4, sat_hrs:4, sat_ot:0};
  const weekday_normal = cfg.workers * cfg.hrs     * WEEKDAYS;
  const weekday_ot     = cfg.workers * cfg.ot      * WEEKDAYS;
  const sat_normal     = cfg.workers * cfg.sat_hrs * SAT_DAYS;
  const sat_ot         = cfg.workers * cfg.sat_ot  * SAT_DAYS;
  return {
    normal:       weekday_normal + sat_normal,
    ot:           weekday_ot     + sat_ot,
    total:        weekday_normal + sat_normal + weekday_ot + sat_ot,
    weekday_normal, weekday_ot,
    sat_normal,   sat_ot,
    daily_weekday: cfg.workers * cfg.hrs,
    daily_sat:    cfg.workers * cfg.sat_hrs,
  };
}

// effective hours = STD hours ÷ efficiency  (ถ้า eff=80% → ใช้เวลาจริงมากกว่า STD 25%)
function effectiveHrs(wc, stdHrs) {
  const eff = (WC_CONFIG[wc]?.eff || 90) / 100;
  return stdHrs / eff;
}

let committedLoadCacheKey = '';
let committedLoadCacheValue = null;

function getCommittedLoadCacheKey() {
  return JSON.stringify({
    orders: ACCEPTED.map(o => ({ product:o.product, qty:o.qty })),
    eff: Object.entries(WC_CONFIG).map(([wc,cfg]) => [wc, cfg.eff]),
    open: OPEN_LOAD,
  });
}

function getCommittedLoadMap() {
  const cacheKey = getCommittedLoadCacheKey();
  if (committedLoadCacheValue && committedLoadCacheKey === cacheKey) return committedLoadCacheValue;

  const loadMap = { ...OPEN_LOAD };
  for (const order of ACCEPTED) {
    const product = PRODUCTS[order.product];
    if (!product) continue;
    for (const op of product.ops) {
      loadMap[op.wc] = (loadMap[op.wc] || 0) + effectiveHrs(op.wc, op.hrs) * order.qty;
    }
  }
  committedLoadCacheKey = cacheKey;
  committedLoadCacheValue = loadMap;
  return loadMap;
}

function getCommittedLoad(wc) {
  return getCommittedLoadMap()[wc] || 0;
}

function getLoadPercent(wc) {
  const cap = getWeeklyCapacity(wc);
  const load = getCommittedLoad(wc);
  return { load, cap, pct: Math.round(load / cap.normal * 100), freehrs: Math.max(0, cap.normal - load) };
}

// ─── Simulate a new order ─────────────────────────────────────
function simulateOrder(productKey, qty, deadlineDays) {
  const product = PRODUCTS[productKey];
  if (!product) return null;

  // Per-WC effective hours needed (STD ÷ efficiency)
  const wcNeeds   = {};  // effective hrs
  const wcNeedsSTD = {}; // STD hrs (for display)
  for (const op of product.ops) {
    const effH = effectiveHrs(op.wc, op.hrs) * qty;
    const stdH = op.hrs * qty;
    wcNeeds[op.wc]    = (wcNeeds[op.wc]    || 0) + effH;
    wcNeedsSTD[op.wc] = (wcNeedsSTD[op.wc] || 0) + stdH;
  }

  // For each WC: check if free hours are enough
  const bottlenecks = [];
  let maxDaysNeeded = 0;

  for (const [wc, neededHrs] of Object.entries(wcNeeds)) {
    if (neededHrs === 0) continue;
    const info = getLoadPercent(wc);
    const cfg  = WC_CONFIG[wc] || {workers:3, hrs:8, ot:4, sat_hrs:4, sat_ot:0};
    const cap  = info.cap;

    // Daily available: avg across week (5 weekdays + 1 sat)
    const dailyNormal = (cap.weekday_normal + cap.sat_normal) / 6;
    const dailyWithOT = (cap.weekday_normal + cap.weekday_ot + cap.sat_normal + cap.sat_ot) / 6;

    const freeHrs = info.freehrs;
    if (neededHrs <= freeHrs) {
      const daysNeeded = Math.ceil(neededHrs / dailyNormal);
      maxDaysNeeded = Math.max(maxDaysNeeded, daysNeeded);
      continue;
    }

    // Need OT
    const extraNeeded  = neededHrs - freeHrs;
    const weeksNeeded  = Math.ceil(deadlineDays / 7);
    const weeklyOTAvail = cap.weekday_ot + cap.sat_ot;
    const otFeasible   = extraNeeded <= weeklyOTAvail * weeksNeeded;

    bottlenecks.push({
      wc, neededHrs, freeHrs,
      stdHrs:      Math.round((wcNeedsSTD[wc]||0) * 10) / 10,
      eff:         WC_CONFIG[wc]?.eff || 90,
      extraNeeded: Math.round(extraNeeded * 10) / 10,
      newLoadPct:  Math.round((info.load + neededHrs) / cap.normal * 100),
      otFeasible,
      sat_note: cfg.sat_hrs < cfg.hrs
        ? `เสาร์ ${cfg.workers * cfg.sat_hrs}h/วัน (จ–ศ ${cfg.workers * cfg.hrs}h)`
        : null,
    });

    const daysNeeded = Math.ceil(neededHrs / dailyWithOT);
    maxDaysNeeded = Math.max(maxDaysNeeded, daysNeeded);
  }

  // Finish date estimates
  const today = new Date();
  // Finish date: skip Sunday + Thai holidays
  const addWorkDays = addWorkDaysReal;

  const finishNormal = addWorkDays(today, maxDaysNeeded);
  const finishOT     = addWorkDays(today, Math.max(1, Math.ceil(maxDaysNeeded * 0.65)));
  const deadline     = addWorkDays(today, deadlineDays);

  const onTimeNormal = finishNormal <= deadline;
  const onTimeOT     = finishOT <= deadline;

  const totalOThrs   = bottlenecks.reduce((a,b) => a + b.extraNeeded, 0);

  const effectiveTotalHrs = Object.values(wcNeeds).reduce((a,b)=>a+b,0);

  return {
    product, qty, deadlineDays,
    wcNeeds, wcNeedsSTD, effectiveTotalHrs,
    bottlenecks,
    finishNormal, finishOT, deadline,
    onTimeNormal, onTimeOT,
    totalOThrs: Math.round(totalOThrs * 10) / 10,
    maxDaysNeeded,
    canFinish: onTimeNormal || onTimeOT,
  };
}

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div>
          <div style="font-size:15px;font-weight:600">${PRODUCTS[pk].label}</div>
          <div style="font-size:12px;color:var(--txt2);margin-top:2px">

          STD <span style="font-family:var(--mono)">${(PRODUCTS[pk].std_hrs*qty).toFixed(1)}</span> ชม. →
          Effective <span style="font-family:var(--mono);color:var(--amber)">${r.effectiveTotalHrs.toFixed(1)}</span> ชม.
          · Deadline ${fmtDate(r.deadline)}
        </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--txt3)">deadline ใน</div>
          <div style="font-size:24px;font-weight:700;font-family:var(--mono);color:${r.deadlineDays<=14?'var(--red)':'var(--amber)'}">${r.deadlineDays}</div>
          <div style="font-size:10px;color:var(--txt3)">วัน</div>
        </div>
      </div>
      <div class="op-timeline">${wcRows}</div>
    </div>

    <!-- 3 Scenarios -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">3 สถานการณ์ที่เป็นไปได้</div>

      <!-- Scenario 1: Normal -->
      <div class="scenario ${r.onTimeNormal?'best':''}">
        <div class="sc-head">
          <div class="sc-tag" style="background:rgba(91,142,240,.15);color:var(--blue)">สถานการณ์ 1</div>
          <div style="font-size:12px;font-weight:600">ทำงานปกติ — ไม่ OT</div>
          ${r.onTimeNormal?'<span class="badge b-ok">✓ ทัน</span>':'<span class="badge b-red">✗ ไม่ทัน</span>'}
        </div>
        <div class="sc-grid">
          <div class="sc-cell"><div class="sc-val" style="color:${r.onTimeNormal?'var(--green)':'var(--red)'}">${fmtDate(r.finishNormal)}</div><div class="sc-lbl">วันที่คาดเสร็จ</div></div>
          <div class="sc-cell"><div class="sc-val" style="color:${sc1_late>0?'var(--red)':sc1_late<0?'var(--green)':'var(--amber)'}">${sc1_late>0?'+'+sc1_late:sc1_late} วัน</div><div class="sc-lbl">เทียบ deadline</div></div>
          <div class="sc-cell"><div class="sc-val">0</div><div class="sc-lbl">ชม. OT</div></div>
        </div>
        ${!r.onTimeNormal && r.bottlenecks.length > 0 ? `
          <div style="margin-top:8px;font-size:11px;color:var(--txt3)">
            Bottleneck: ${r.bottlenecks.map(b=>`<span style="color:var(--red)">${b.wc}</span>`).join(', ')}
            — โหลดเกิน ${r.bottlenecks.map(b=>b.newLoadPct+'%').join(', ')}
          </div>` : ''}
      </div>

      <!-- Scenario 2: With OT -->
      <div class="scenario ${!r.onTimeNormal && r.onTimeOT?'best':''}">
        <div class="sc-head">
          <div class="sc-tag" style="background:rgba(155,127,232,.15);color:var(--purple)">สถานการณ์ 2</div>
          <div style="font-size:12px;font-weight:600">ทำ OT ที่ Bottleneck</div>
          ${r.onTimeOT?'<span class="badge b-ok">✓ ทัน</span>':'<span class="badge b-warn">⚠ อาจไม่ทัน</span>'}
        </div>
        <div class="sc-grid">
          <div class="sc-cell"><div class="sc-val" style="color:${r.onTimeOT?'var(--green)':'var(--amber)'}">${fmtDate(r.finishOT)}</div><div class="sc-lbl">วันที่คาดเสร็จ</div></div>
          <div class="sc-cell"><div class="sc-val" style="color:${sc2_late>0?'var(--amber)':sc2_late<0?'var(--green)':'var(--txt)'}">${sc2_late>0?'+'+sc2_late:sc2_late} วัน</div><div class="sc-lbl">เทียบ deadline</div></div>
          <div class="sc-cell"><div class="sc-val" style="color:var(--purple)">${r.totalOThrs}</div><div class="sc-lbl">ชม. OT เพิ่ม</div></div>
        </div>
        ${r.bottlenecks.length > 0 ? `
          <div style="margin-top:8px;font-size:11px;color:var(--txt2)">
            OT ที่ต้องการ: ${r.bottlenecks.map(b=>`${b.wc} +${b.extraNeeded}h`).join(' · ')}
          </div>` : ''}
      </div>

      <!-- Scenario 3: Negotiate deadline -->
      <div class="scenario">
        <div class="sc-head">
          <div class="sc-tag" style="background:rgba(224,156,42,.12);color:var(--amber)">สถานการณ์ 3</div>
          <div style="font-size:12px;font-weight:600">เจรจา Deadline ใหม่</div>
          <span class="badge b-warn">เจรจา</span>
        </div>
        <div class="sc-grid">
          <div class="sc-cell"><div class="sc-val" style="color:var(--amber)">${fmtDate(r.finishNormal)}</div><div class="sc-lbl">วันที่รับได้จริง</div></div>
          <div class="sc-cell"><div class="sc-val">${Math.max(0,diffDays(today,r.finishNormal))}</div><div class="sc-lbl">วันที่ต้องการ</div></div>
          <div class="sc-cell"><div class="sc-val">0</div><div class="sc-lbl">ชม. OT</div></div>
        </div>
        <div style="margin-top:8px;font-size:11px;color:var(--txt2)">
          เสนอ deadline ใหม่: <strong style="color:var(--amber)">${fmtDate(r.finishNormal)}</strong>
          (ขยาย ${Math.max(0, sc1_late)} วัน จาก deadline เดิม)
        </div>
      </div>
    </div>

    <!-- Decision -->
    ${renderDecision(r, pk, qty)}
  `;
  el.innerHTML = html;
}

function renderDecision(r, pk, qty) {
  if (r.onTimeNormal) {
    return `<div class="decision-wrap dec-accept">
      <div class="dec-icon">✅</div>
      <div class="dec-title" style="color:var(--green)">รับ Order ได้ทันที — ไม่ต้อง OT</div>
      <div class="dec-sub">Capacity เพียงพอ เสร็จก่อน deadline ${Math.abs(diffDays(r.deadline,r.finishNormal))} วัน</div>
      <div class="dec-detail">
        <strong>เสร็จได้:</strong> ${fmtDate(r.finishNormal)} · 
        <strong>Deadline:</strong> ${fmtDate(r.deadline)}<br>
        <strong>STD Hours:</strong> ${(PRODUCTS[pk].std_hrs*qty).toFixed(1)} ชม. →
        <strong>Effective:</strong> <span style="color:var(--amber)">${r.effectiveTotalHrs.toFixed(1)} ชม.</span>
      </div>
      <div class="dec-actions">
        <button class="btn-green" onclick="acceptOrder('${pk}', ${qty}, '${r.deadline.toISOString()}')">✓ รับ Order นี้</button>
        <button class="btn-ghost" onclick="runSimulation()">คำนวณใหม่</button>
      </div>
    </div>`;
  }
  if (r.onTimeOT) {
    return `<div class="decision-wrap dec-ot">
      <div class="dec-icon">⚡</div>
      <div class="dec-title" style="color:var(--amber)">รับได้ — แต่ต้องทำ OT ${r.totalOThrs} ชม.</div>
      <div class="dec-sub">ไม่มี Capacity พอในเวลาปกติ แต่ถ้าทำ OT ที่ bottleneck จะทัน deadline</div>
      <div class="dec-detail">
        <strong>Bottleneck:</strong> ${r.bottlenecks.map(b=>b.wc).join(', ')}<br>
        <strong>OT ที่ต้องการ:</strong> ${r.bottlenecks.map(b=>`${b.wc} +${b.extraNeeded}h`).join(' · ')}<br>
        <strong>เสร็จ (ถ้า OT):</strong> ${fmtDate(r.finishOT)}
      </div>
      <div class="dec-actions">
        <button class="btn-primary" onclick="acceptOrder('${pk}', ${qty}, '${r.deadline.toISOString()}')">⚡ รับ + วางแผน OT</button>
        <button style="border-color:rgba(224,156,42,.3);color:var(--amber)" onclick="runSimulation()">เจรจา Deadline</button>
        <button class="btn-ghost" onclick="">ปฏิเสธ</button>
      </div>
    </div>`;
  }
  return `<div class="decision-wrap dec-reject">
    <div class="dec-icon">❌</div>
    <div class="dec-title" style="color:var(--red)">รับไม่ได้ภายใน Deadline นี้</div>
    <div class="dec-sub">แม้ทำ OT สูงสุดก็ไม่สามารถส่งได้ทัน ต้องเจรจา deadline หรือปฏิเสธ</div>
    <div class="dec-detail">
      <strong>เร็วที่สุดที่ทำได้:</strong> ${fmtDate(r.finishNormal)}<br>
      <strong>Bottleneck หลัก:</strong> ${r.bottlenecks.map(b=>b.wc).join(', ')}<br>
      <strong>ขาด Capacity:</strong> ${r.bottlenecks.map(b=>`${b.wc} ${b.extraNeeded}h`).join(' · ')}
    </div>
    <div class="dec-actions">
      <button style="border-color:rgba(224,90,78,.3);color:var(--red)">✗ ปฏิเสธ Order</button>
      <button class="btn-primary" onclick="">เจรจา Deadline → ${fmtDate(r.finishNormal)}</button>
    </div>
  </div>`;
}

function acceptOrder(pk, qty, deadlineISO) {
  const order = {
    id: 'ORD-'+(String(nextId++).padStart(3,'0')),
    product: pk,
    qty,
    deadline: String(deadlineISO).slice(0,10),
    customer: 'ลูกค้าใหม่',
    kva: PRODUCTS[pk]?.kva || 0,
    category: 'หลัก',
  };
  ACCEPTED.push(order);
  invalidateLoadCache();
  syncOrderToBackend(order, 'POST');
  setTab('simulate');
}
function removeOrder(id) {
  const order = ACCEPTED.find(o => o.id === id);
  ACCEPTED = ACCEPTED.filter(o => o.id !== id);
  invalidateLoadCache();
  if (order) syncOrderToBackend(order, 'DELETE');
  setTab('simulate');
}

function updateWC(wc, field, val) {
  if (!WC_CONFIG[wc]) return;

// วันหยุดพิเศษโรงงาน (เพิ่มเองได้)
let FACTORY_HOLIDAYS = {};
let ITEM_CODES = {}; // code → { description, category }

function isHoliday(d) {
  const key = toKey(d);
  return HOLIDAYS[key] || FACTORY_HOLIDAYS[key] || null;
}
function isWorkDay(d) {
  const day = d.getDay();
  return day !== 0 && !isHoliday(d); // ไม่ใช่อาทิตย์ และไม่ใช่วันหยุด
}
function isSaturday(d) { return d.getDay() === 6; }
function toKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// นับวันทำงานจริง (หักวันหยุดไทย + อาทิตย์)
function addWorkDaysReal(start, n) {
  let count = 0, cur = new Date(start);
  while (count < n) {
    cur.setDate(cur.getDate() + 1);
    if (isWorkDay(cur)) count++;
  }
  return cur;
}

// นับชั่วโมงทำงานจริง (เสาร์ = sat_hrs, จ–ศ = hrs)
function getAvgDailyHrs(wc) {
  const cfg = WC_CONFIG[wc] || {workers:3, hrs:8, sat_hrs:4};
  // ต่อสัปดาห์: 5 วัน × hrs + 1 วัน × sat_hrs แต่หักวันหยุดเฉลี่ย ~1.5 วัน/เดือน ≈ 0.35 วัน/สัปดาห์
  const wkCapacity = cfg.workers * (5 * cfg.hrs + 1 * cfg.sat_hrs);
  return wkCapacity / 6; // avg per work day
}

async function saveItemCode(code, description, category) {
  ITEM_CODES[code] = { description, category };
  await apiCall(`/api/item-codes/${encodeURIComponent(code)}`, {
    method: 'PUT',
    body: JSON.stringify({ description, category }),
  });
  itemDecodeEditCode = null;
  itemDecodeAddMode = false;
  setTab('itemdecode');
}

async function deleteItemCode(code) {
  if (!confirm(`ลบ Item Code "${code}" ออกจากระบบ?`)) return;
  delete ITEM_CODES[code];
  await apiCall(`/api/item-codes/${encodeURIComponent(code)}`, { method: 'DELETE' });
  setTab('itemdecode');
}

function calNav(dir) {
  calViewMonth += dir;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  buildCalGrid();
}

function buildCalGrid() {
  const titleEl = document.getElementById('cal-title');
  const gridEl  = document.getElementById('cal-grid');
  if (!titleEl || !gridEl) return;

  const today = new Date();
  titleEl.textContent = `${TH_MONTHS[calViewMonth]} ${calViewYear + 543}`;

  const first = new Date(calViewYear, calViewMonth, 1);
  const last  = new Date(calViewYear, calViewMonth+1, 0);
  const startDow = first.getDay(); // 0=Sun

  let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
    ${TH_DAYS.map((d,i) => `<div style="text-align:center;font-size:10px;font-weight:600;padding:4px 0;color:${i===0?'var(--red)':i===6?'var(--amber)':'var(--txt3)'}">${d}</div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;

  // Empty cells before first day
  for (let i = 0; i < startDow; i++) html += `<div></div>`;

  for (let day = 1; day <= last.getDate(); day++) {
    const d    = new Date(calViewYear, calViewMonth, day);
    const key  = toKey(d);
    const dow  = d.getDay();
    const isSun = dow === 0;
    const isSat = dow === 6;
    const isToday = toKey(d) === toKey(today);
    const hol   = HOLIDAYS[key];
    const fhol  = FACTORY_HOLIDAYS[key];
    const anyHol = hol || fhol;

    let bg = 'transparent', border = 'transparent', color = 'var(--txt2)';
    if (isSun)  { color = 'var(--red)'; bg = 'rgba(224,90,78,.05)'; }
    if (isSat)  { color = 'var(--amber)'; bg = 'rgba(224,156,42,.06)'; border = 'rgba(224,156,42,.15)'; }
    if (hol)    { bg = 'rgba(224,90,78,.15)'; border = 'rgba(224,90,78,.35)'; color = 'var(--red)'; }
    if (fhol)   { bg = 'rgba(155,127,232,.15)'; border = 'rgba(155,127,232,.35)'; color = 'var(--purple)'; }
    if (isToday){ border = 'var(--amber)'; }

    const tooltip = anyHol ? `title="${anyHol}"` : '';
    html += `<div ${tooltip} onclick="calDayClick('${key}','${anyHol||''}',${!!fhol})"
      style="aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;
             background:${bg};border:1px solid ${border};position:relative;transition:all .1s"
      onmouseover="this.style.filter='brightness(1.3)'" onmouseout="this.style.filter=''">
      <div style="font-size:12px;font-weight:${isToday||anyHol?'700':'400'};color:${color}">${day}</div>
      ${anyHol?`<div style="width:4px;height:4px;border-radius:50%;background:${fhol?'var(--purple)':'var(--red)'};margin-top:1px"></div>`:''}
      ${isToday?`<div style="position:absolute;inset:0;border-radius:6px;border:2px solid var(--amber);pointer-events:none"></div>`:''}
    </div>`;
  }
  html += `</div>`;
  gridEl.innerHTML = html;
}

function calDayClick(key, holName, isFactory) {
  if (isFactory) {
    if (confirm(`ลบวันหยุดโรงงาน "${holName}" (${key})?`)) {
      removeFactoryHoliday(key);
    }
  } else if (!HOLIDAYS[key]) {
    const name = prompt(`เพิ่มวันหยุดโรงงาน ${key}:\nชื่อวันหยุด:`);
    if (name) {
      FACTORY_HOLIDAYS[key] = name;
      invalidateLoadCache();
      syncFactoryHolidayToBackend(key, name);
      setTab('calendar');
    }
  }
}

function addFactoryHoliday() {
  const dateEl = document.getElementById('add-hol-date');
  const nameEl = document.getElementById('add-hol-name');
  const key    = dateEl?.value;
  const name   = nameEl?.value.trim();
  if (!key || !name) { alert('กรุณากรอกวันที่และชื่อวันหยุด'); return; }
  if (HOLIDAYS[key])  { alert('วันนี้เป็นวันหยุดราชการอยู่แล้ว'); return; }
  FACTORY_HOLIDAYS[key] = name;
  invalidateLoadCache();
  syncFactoryHolidayToBackend(key, name);
  setTab('calendar');
}

function removeFactoryHoliday(key) {
  delete FACTORY_HOLIDAYS[key];
  invalidateLoadCache();
  deleteFactoryHolidayFromBackend(key);
  setTab('calendar');
}

    <div>หมายเหตุ: Effective Hours = STD Hours ÷ Efficiency% · จ–เสาร์ (หักวันหยุดนักขัตฤกษ์)</div>
  </div>
</div>

</body>
</html>`;

  const win = window.open('', '_blank', 'width=900,height=800');
  if (win) {
    win.document.write(html);
    win.document.close();
    win.focus();
    return;
  }

  const blob = new Blob([html], { type:'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ekarat-capacity-report-${today.toISOString().slice(0,10)}.html`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 30000);
  alert('เบราว์เซอร์บล็อกหน้าต่าง PDF preview จึงดาวน์โหลดไฟล์รายงาน HTML ให้แทน เปิดไฟล์แล้วกด Print / Save PDF ได้เลย');
}

// ═══════════════════════════════════════════════════════════════
// GANTT — Job Shop Scheduler
// ═══════════════════════════════════════════════════════════════

// Order colors palette
const ORDER_COLORS = [
  '#5b8ef0','#e09c2a','#4caf7d','#9b7fe8','#e05a4e',
  '#26c6da','#ef9f27','#66bb6a','#ab47bc','#ec407a',
];

let scheduleCacheKey = '';
let scheduleCacheValue = null;

function getScheduleCacheKey() {
  return JSON.stringify({
    orders: ACCEPTED.map(o => ({
      id:o.id, product:o.product, qty:o.qty, deadline:o.deadline,
      customer:o.customer, kva:o.kva, category:o.category
    })),
    wc: Object.entries(WC_CONFIG).map(([wc,cfg]) => [
      wc, cfg.workers, cfg.hrs, cfg.sat_hrs, cfg.eff
    ]),
    holidays: Object.keys({...HOLIDAYS, ...FACTORY_HOLIDAYS}).sort(),
  });
}

function getDayCapacityHours(wc, d) {
  if (!isWorkDay(d)) return 0;
  const cfg = WC_CONFIG[wc] || { workers:3, hrs:8, sat_hrs:4 };
  const dayHours = d.getDay() === 6 ? (cfg.sat_hrs || 0) : (cfg.hrs || 0);
  return Math.max(0, (cfg.workers || 0) * dayHours);
}

function getDayShiftHours(wc, d) {
  const cfg = WC_CONFIG[wc] || { hrs:8, sat_hrs:4 };
  return Math.max(0, d.getDay() === 6 ? (cfg.sat_hrs || 0) : (cfg.hrs || 0));
}

// Schedule all accepted orders using earliest-available-slot per WC
function scheduleOrders() {
  if (ACCEPTED.length === 0) return { orders:[], wcTimeline:{}, spanDays:60 };

  const cacheKey = getScheduleCacheKey();
  if (scheduleCacheValue && scheduleCacheKey === cacheKey) return scheduleCacheValue;

  const today = new Date(); today.setHours(0,0,0,0);

  // WC next-free timestamp (ms)
  const wcFree = {};

  // Sort by plan_date → deadline → category priority (Fast first)
  const catPrio = { 'Fast': 0, 'หลัก': 1, 'เสริม': 2 };
  const toSchedule = [...ACCEPTED].sort((a, b) => {
    const pdA = a.plan_date || a.deadline;
    const pdB = b.plan_date || b.deadline;
    if (pdA < pdB) return -1;
    if (pdA > pdB) return 1;
    const ca = catPrio[a.category] ?? 1;
    const cb = catPrio[b.category] ?? 1;
    if (ca !== cb) return ca - cb;
    return (a.deadline || '') < (b.deadline || '') ? -1 : 1;
  });

  // Result per order
  const scheduled = toSchedule.map((order, oi) => {
    const product = PRODUCTS[order.product];
    if (!product) return null;

    let prevEnd = today.getTime(); // operations must be sequential within order
    const ops = [];

    // Merge consecutive ops on same WC
    const mergedOps = [];
    for (const op of product.ops) {
      if (op.hrs <= 0) continue;
      const effH = effectiveHrs(op.wc, op.hrs) * order.qty;
      if (mergedOps.length > 0 && mergedOps[mergedOps.length-1].wc === op.wc) {
        mergedOps[mergedOps.length-1].effHrs += effH;
        mergedOps[mergedOps.length-1].name += '+' + op.name.split('(')[0].trim();
      } else {
        mergedOps.push({ wc: op.wc, name: op.name, effHrs: effH });
      }
    }

    for (const op of mergedOps) {
      const cfg = WC_CONFIG[op.wc] || { workers:3, hrs:8, sat_hrs:4 };

      // Earliest start: after prev op ends AND after WC is free
      const wcFreeTime = wcFree[op.wc] || today.getTime();
      let startMs = Math.max(prevEnd, wcFreeTime);

      // Snap to next work day start
      let startDate = new Date(startMs); startDate.setHours(8,0,0,0);
      if (!isWorkDay(startDate)) {
        startDate = nextWorkDay(startDate);
      }

      // Calculate end: walk forward work-days until hours consumed
      let hrsLeft = op.effHrs;
      let cur = new Date(startDate);
      let endDate = new Date(cur);
      let guard = 0;

      while (hrsLeft > 0 && guard < 730) {
        const avail = getDayCapacityHours(op.wc, cur);
        if (avail > 0) {
          const used = Math.min(hrsLeft, avail);
          hrsLeft -= used;
          endDate = new Date(cur);
          // Clock hours consumed = person-hours ÷ workers (exact, no ceil)
          const shiftHours = getDayShiftHours(op.wc, cur);
          const clockHrs   = avail > 0 ? shiftHours * used / avail : shiftHours;
          endDate.setHours(8 + clockHrs, 0, 0, 0);
        }
        if (hrsLeft > 0) cur.setDate(cur.getDate() + 1);
        guard++;
      }

      ops.push({
        wc: op.wc,
        wcName: WC_CONFIG[op.wc]?.name || op.wc,
        name: op.name,
        effHrs: Math.round(op.effHrs * 10) / 10,
        startDate: new Date(startDate),
        endDate: new Date(endDate),
      });

      prevEnd = endDate.getTime() + 86400000; // next day after this op
      wcFree[op.wc] = endDate.getTime() + 86400000;
    }

    const orderStart = ops[0]?.startDate || today;
    const orderEnd   = ops[ops.length-1]?.endDate || today;
    const dl         = new Date(order.deadline);
    const isLate     = orderEnd > dl;

    return {
      id: order.id,
      product: PRODUCTS[order.product]?.label.split('—')[0].trim() || order.product,
      customer: order.customer || '',
      kva: order.kva || 0,
      category: order.category || '',
      qty: order.qty,
      deadline: dl,
      orderStart, orderEnd,
      isLate,
      lateDays: isLate ? Math.round((orderEnd-dl)/86400000) : 0,
      ops,
      color: ORDER_COLORS[oi % ORDER_COLORS.length],
    };
  }).filter(Boolean);

  // Total span
  const allEnds = scheduled.map(o => o.orderEnd.getTime());
  const maxEnd  = new Date(Math.max(...allEnds, today.getTime() + 30*86400000));
  const spanDays = Math.ceil((maxEnd - today) / 86400000) + 5;

  // WC timeline for conflict detection
  const wcTimeline = {};
  for (const order of scheduled) {
    for (const op of order.ops) {
      if (!wcTimeline[op.wc]) wcTimeline[op.wc] = [];
      wcTimeline[op.wc].push({ orderId: order.id, color: order.color, ...op });
    }
  }

  scheduleCacheKey = cacheKey;
  scheduleCacheValue = { orders: scheduled, wcTimeline, spanDays };
  return scheduleCacheValue;
}

function nextWorkDay(d) {
  const next = new Date(d);
  next.setDate(next.getDate() + 1);
  while (!isWorkDay(next)) next.setDate(next.getDate() + 1);
  return next;
}

// ── Production Plan ──────────────────────────────────────────────────────────
function renderPlan() {
  if (ACCEPTED.length === 0) {
    return `<div class="panel" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3)">
      <div style="font-size:48px">📋</div>
      <div style="font-size:14px">ยังไม่มี Order ในระบบ</div>
      <button class="btn-primary" onclick="setTab('simulate')">ไปรับ Order →</button>
    </div>`;
  }

  const { orders } = scheduleOrders();
  if (!orders.length) {
    return `<div class="panel"><div style="padding:2rem;color:var(--txt3)">ไม่มีข้อมูล routing สำหรับ orders ที่เลือก</div></div>`;
  }

  // Department → WC grouping
  const DEPTS = [
    { key:'core',  label:'แกนเหล็ก',      col:'#c07800', wcs:['EE3102','EE3104','EE3105','EE3106','EE3107'] },
    { key:'coil',  label:'พันคอยล์',      col:'#1a7a4a', wcs:['EE3201','EE3202','EE3203'] },
    { key:'ins',   label:'ฉนวน/ชิ้นส่วน', col:'#2a8898', wcs:['EE3601','EE3505','EE3504','EE3501','EE3503'] },
    { key:'asm',   label:'ประกอบ',         col:'#1a5fc0', wcs:['EE3301','EE3302','EE3303'] },
    { key:'fit',   label:'ติดอุปกรณ์',    col:'#6c3da8', wcs:['EE3401','EE3402','EE3403'] },
    { key:'test',  label:'QC/Test',        col:'#c0392b', wcs:['EE4201','EE4202','EE4204'] },
    { key:'tank',  label:'ตัวถัง',         col:'#8b5e3c', wcs:['MP5101','MP5102','MP5103','MP5202','MP5304','MP5601','MP5602','MP5603'] },
    { key:'paint', label:'งานสี',          col:'#9a5c38', wcs:['MP5401','MP5402','MP5403','MP5404'] },
    { key:'power', label:'Power TR',       col:'#b03020', wcs:['PT3701'] },
  ];
  const WC_DEPT = {};
  DEPTS.forEach(d => d.wcs.forEach(w => WC_DEPT[w] = d.key));

  // Only show depts that appear in scheduled ops
  const usedDeptKeys = new Set();
  orders.forEach(o => o.ops.forEach(op => { if (WC_DEPT[op.wc]) usedDeptKeys.add(WC_DEPT[op.wc]); }));
  const activeDepts = DEPTS.filter(d => usedDeptKeys.has(d.key));

  // Per-order dept aggregation: hours + date range
  const orderDeptData = orders.map(order => {
    const dm = {};
    order.ops.forEach(op => {
      const dk = WC_DEPT[op.wc];
      if (!dk) return;
      if (!dm[dk]) dm[dk] = { hrs: 0, start: op.startDate, end: op.endDate };
      dm[dk].hrs += op.effHrs;
      if (op.startDate < dm[dk].start) dm[dk].start = op.startDate;
      if (op.endDate   > dm[dk].end)   dm[dk].end   = op.endDate;
    });
    return dm;
  });

  // Daily load: day → dept → { scheduledHrs, capacityHrs, orderIds }
  const dailyLoad = {};
  function getDeptDayCap(deptKey, date) {
    const dept = DEPTS.find(d => d.key === deptKey);
    return dept ? dept.wcs.reduce((s, wc) => s + getDayCapacityHours(wc, date), 0) : 0;
  }

  orders.forEach(order => {
    order.ops.forEach(op => {
      const dk = WC_DEPT[op.wc];
      if (!dk) return;
      let hrsLeft = op.effHrs;
      const cur = new Date(op.startDate); cur.setHours(0,0,0,0);
      const end = new Date(op.endDate);   end.setHours(23,59,59,0);
      while (hrsLeft > 0.01 && cur <= end) {
        if (isWorkDay(cur)) {
          const dayKey = cur.toISOString().slice(0,10);
          const wcCap  = getDayCapacityHours(op.wc, cur);
          const used   = Math.min(hrsLeft, wcCap);
          if (used > 0) {
            if (!dailyLoad[dayKey]) dailyLoad[dayKey] = {};
            if (!dailyLoad[dayKey][dk]) {
              dailyLoad[dayKey][dk] = { scheduledHrs: 0, capacityHrs: getDeptDayCap(dk, cur), orderIds: new Set() };
            }
            dailyLoad[dayKey][dk].scheduledHrs += used;
            dailyLoad[dayKey][dk].orderIds.add(order.id);
            hrsLeft -= used;
          }
        }
        cur.setDate(cur.getDate() + 1);
      }
    });
  });

  const sortedDays = Object.keys(dailyLoad).sort();

  // Helpers
  const fmtS = d => {
    if (!d) return '—';
    const dt = d instanceof Date ? d : new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('th-TH', { day:'numeric', month:'short' });
  };
  const fmtDayLabel = s => {
    const dt = new Date(s + 'T00:00:00');
    return dt.toLocaleDateString('th-TH', { weekday:'short', day:'numeric', month:'short' });
  };

  const loadCell = (load) => {
    if (!load || load.scheduledHrs < 0.1) return `<td style="padding:4px 5px;text-align:center;color:var(--bord2);font-size:10px">—</td>`;
    const pct = load.capacityHrs > 0 ? Math.round(load.scheduledHrs / load.capacityHrs * 100) : 0;
    const bg  = pct >= 100 ? 'rgba(224,90,78,.2)' : pct >= 80 ? 'rgba(224,156,42,.15)' : pct >= 40 ? 'rgba(91,142,240,.1)' : 'rgba(76,175,125,.08)';
    const col = pct >= 100 ? 'var(--red)' : pct >= 80 ? 'var(--amber)' : 'var(--txt2)';
    const tip = [...load.orderIds].join(', ');
    return `<td style="padding:4px 5px;text-align:center;background:${bg}" title="${tip}">
      <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${col}">${pct}%</div>
      <div style="font-size:9px;color:var(--txt3)">${load.scheduledHrs.toFixed(0)}/${load.capacityHrs.toFixed(0)}h</div>
    </td>`;
  };

  // KPIs
  const onTime  = orders.filter(o => !o.isLate).length;
  const late    = orders.filter(o =>  o.isLate).length;
  const maxEnd  = new Date(Math.max(...orders.map(o => o.orderEnd.getTime())));
  const totalEffHrs = orders.reduce((s,o) => s + o.ops.reduce((ss,op) => ss+op.effHrs, 0), 0);

  // Group by item code (product key from ACCEPTED)
  const itemGroups = {};
  orders.forEach((order, i) => {
    const src = ACCEPTED.find(a => a.id === order.id);
    const itemCode = src?.product || order.product;
    const dm = orderDeptData[i];
    if (!itemGroups[itemCode]) {
      itemGroups[itemCode] = {
        itemCode,
        label: PRODUCTS[itemCode]?.label?.split('—')[0]?.trim() || itemCode,
        kva: PRODUCTS[itemCode]?.kva || 0,
        stdHrs: PRODUCTS[itemCode]?.std_hrs || 0,
        orderCount: 0,
        totalQty: 0,
        deptHrs: {},
        totalHrs: 0,
      };
    }
    const g = itemGroups[itemCode];
    g.orderCount++;
    g.totalQty += order.qty;
    activeDepts.forEach(d => {
      if (!g.deptHrs[d.key]) g.deptHrs[d.key] = 0;
      if (dm[d.key]) g.deptHrs[d.key] += dm[d.key].hrs;
    });
    g.totalHrs += order.ops.reduce((s, op) => s + op.effHrs, 0);
  });
  const itemRows = Object.values(itemGroups).sort((a, b) => b.kva - a.kva);

  return `<div class="panel" style="max-width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:15px;font-weight:600">📋 แผนผลิต — Production Schedule</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">คำนวณจาก Routing + Capacity + วันหยุด · เรียงตาม plan_date → deadline</div>
      </div>
    </div>

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
      <div class="mc"><div class="mc-label">Orders ทั้งหมด</div><div class="mc-val">${orders.length}</div></div>
      <div class="mc"><div class="mc-label">ทันกำหนด</div><div class="mc-val" style="color:var(--green)">${onTime}</div><div class="mc-sub">จาก ${orders.length} orders</div></div>
      <div class="mc"><div class="mc-label">เกิน Deadline</div><div class="mc-val" style="color:${late>0?'var(--red)':'var(--green)'}">${late}</div></div>
      <div class="mc"><div class="mc-label">แผนเสร็จทั้งหมด</div><div class="mc-val" style="font-size:13px">${fmtS(maxEnd)}</div><div class="mc-sub">${totalEffHrs.toFixed(0)} eff.hrs รวม</div></div>
    </div>

    <!-- Item Code summary table -->
    <div class="card" style="margin-bottom:12px;padding:12px">
      <div class="card-title">⏱ ชั่วโมงผลิตตาม Item Code — เวลาที่ใช้แต่ละแผนก</div>
      <div style="overflow-x:auto">
        <table style="border-collapse:collapse;font-size:11px;white-space:nowrap;width:100%">
          <thead>
            <tr style="background:var(--bg3);border-bottom:1px solid var(--bord2)">
              <th style="text-align:left;padding:6px 8px;color:var(--txt3);font-weight:600;font-size:10px;min-width:110px">Item Code</th>
              <th style="text-align:center;padding:6px 6px;color:var(--txt3);font-weight:600;font-size:10px">Orders</th>
              <th style="text-align:center;padding:6px 6px;color:var(--txt3);font-weight:600;font-size:10px">Qty รวม</th>
              <th style="text-align:center;padding:6px 6px;color:var(--txt3);font-weight:600;font-size:10px">Std (h/unit)</th>
              ${activeDepts.map(d=>`<th style="text-align:center;padding:6px 5px;color:${d.col};font-weight:700;font-size:10px;min-width:72px;border-left:1px solid var(--bord)">${d.label}</th>`).join('')}
              <th style="text-align:center;padding:6px 8px;color:var(--amber);font-weight:700;font-size:10px;border-left:1px solid var(--bord2)">รวม (h)</th>
              <th style="text-align:center;padding:6px 6px;color:var(--txt3);font-weight:600;font-size:10px">h/unit</th>
            </tr>
          </thead>
          <tbody>
            ${itemRows.map(g => `<tr style="border-bottom:0.5px solid var(--bord)">
              <td style="padding:5px 8px">
                <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--txt)">${g.itemCode}</div>
                <div style="font-size:9px;color:var(--txt3)">${g.label}</div>
              </td>
              <td style="padding:5px 6px;text-align:center;font-size:10px;color:var(--txt2)">${g.orderCount}</td>
              <td style="padding:5px 6px;text-align:center;font-family:var(--mono);font-size:11px;font-weight:700">${g.totalQty}</td>
              <td style="padding:5px 6px;text-align:center;font-size:10px;color:var(--txt3)">${g.stdHrs.toFixed(1)}</td>
              ${activeDepts.map(d => {
                const h = g.deptHrs[d.key] || 0;
                if (h < 0.05) return `<td style="padding:5px 5px;text-align:center;color:var(--bord2);border-left:1px solid var(--bord)">—</td>`;
                const pctOfTotal = g.totalHrs > 0 ? h / g.totalHrs : 0;
                const barW = Math.round(pctOfTotal * 60);
                return `<td style="padding:5px 5px;text-align:center;border-left:1px solid var(--bord)" title="${d.label}: ${h.toFixed(1)}h (${Math.round(pctOfTotal*100)}% ของ order นี้)">
                  <div style="font-family:var(--mono);font-size:10px;font-weight:700;color:${d.col}">${h.toFixed(1)}h</div>
                  <div style="height:3px;background:var(--bg3);border-radius:2px;margin-top:2px"><div style="width:${barW}px;max-width:100%;height:3px;background:${d.col};border-radius:2px;opacity:.7"></div></div>
                </td>`;
              }).join('')}
              <td style="padding:5px 8px;text-align:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--amber);border-left:1px solid var(--bord2)">${g.totalHrs.toFixed(1)}</td>
              <td style="padding:5px 6px;text-align:center;font-size:10px;color:var(--txt3)">${g.totalQty > 0 ? (g.totalHrs/g.totalQty).toFixed(1) : '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Order × Department table -->
    <div class="card" style="margin-bottom:12px;padding:12px">
      <div class="card-title">ชั่วโมงผลิตต่อ Order × แผนก</div>
      <div style="overflow-x:auto">
        <table style="border-collapse:collapse;font-size:11px;white-space:nowrap;width:100%">
          <thead>
            <tr style="background:var(--bg3);border-bottom:1px solid var(--bord2)">
              <th style="text-align:left;padding:6px 8px;color:var(--txt3);font-weight:600;font-size:10px">Order</th>
              <th style="text-align:left;padding:6px 8px;color:var(--txt3);font-weight:600;font-size:10px">ลูกค้า / สินค้า</th>
              <th style="text-align:center;padding:6px 6px;color:var(--txt3);font-weight:600;font-size:10px">Qty</th>
              <th style="text-align:center;padding:6px 6px;color:var(--txt3);font-weight:600;font-size:10px">Plan Date</th>

function buildOrderGantt() {
  const { orders, spanDays } = scheduleOrders();
  const today  = new Date(); today.setHours(0,0,0,0);
  const CELL   = 28; // px per day
  const ROW_H  = 44;
  const LABEL_W = 180;

  // Day headers — group by week
  let dayHeaders = '', weekHeaders = '';
  const totalDays = Math.min(spanDays, 90);
  let wkStart = 0;
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const dow = d.getDay();
    const isHol = !!isHoliday(d);
    const isSat = dow === 6;
    const isSun = dow === 0;
    const bg = isHol ? 'rgba(224,90,78,.12)' : isSun ? 'rgba(224,90,78,.06)' : isSat ? 'rgba(224,156,42,.06)' : 'transparent';
    dayHeaders += `<div style="width:${CELL}px;flex-shrink:0;text-align:center;font-size:9px;
      color:${isHol?'var(--red)':isSat?'var(--amber)':isSun?'rgba(224,90,78,.5)':'var(--txt3)'};
      background:${bg};border-right:1px solid var(--bord);padding:3px 0;white-space:nowrap">
      ${d.getDate()}
    </div>`;
    if (dow === 1 || i === 0) {
      const wkW = Math.min(7, totalDays - i) * CELL;
      weekHeaders += `<div style="width:${wkW}px;flex-shrink:0;text-align:center;font-size:9px;
        color:var(--txt2);border-right:1px solid var(--bord2);padding:2px 0">
        ${TH_MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}
      </div>`;
    }
  }

  // Order rows
  const rows = orders.map(order => {
    const conflicting = orders.some(o2 => o2.id !== order.id &&
      o2.ops.some(op2 => order.ops.some(op1 =>
        op1.wc === op2.wc &&
        op1.startDate < op2.endDate && op2.startDate < op1.endDate
      ))
    );

    // Op bars
    const bars = order.ops.map(op => {
      const left  = Math.round((op.startDate - today) / 86400000) * CELL;
      const width = Math.max(CELL, Math.round((op.endDate - op.startDate) / 86400000 + 1) * CELL);
      if (left > totalDays * CELL || left < 0) return '';
      return `<div title="${op.wc}: ${op.name} (${op.effHrs}h)"
        style="position:absolute;left:${left}px;width:${Math.min(width, totalDays*CELL - left)}px;
               top:8px;height:26px;border-radius:4px;
               background:${order.color};opacity:.88;
               display:flex;align-items:center;padding:0 6px;
               font-size:10px;font-weight:600;color:#000;
               white-space:nowrap;overflow:hidden;cursor:pointer;
               border:1px solid rgba(255,255,255,.2)">
        <span style="overflow:hidden;text-overflow:ellipsis">${op.wc}</span>
      </div>`;
    }).join('');

    // Deadline marker
    const dlLeft = Math.round((order.deadline - today) / 86400000) * CELL;
    const dlMarker = dlLeft >= 0 && dlLeft <= totalDays * CELL
      ? `<div style="position:absolute;left:${dlLeft}px;top:0;width:2px;height:${ROW_H}px;
               background:${order.isLate?'var(--red)':'rgba(76,175,125,.6)'};z-index:2">
           <div style="position:absolute;top:0;left:3px;font-size:8px;color:${order.isLate?'var(--red)':'var(--green)'};white-space:nowrap;font-weight:700">DL</div>
         </div>`
      : '';

    return `<div style="display:flex;border-bottom:1px solid var(--bord)">
      <!-- Label -->
      <div style="width:${LABEL_W}px;flex-shrink:0;padding:0 10px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--bord2);background:var(--bg2)">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:8px;height:8px;border-radius:2px;background:${order.color};flex-shrink:0"></div>
          <span style="font-family:var(--mono);font-size:10px;color:var(--amber);font-weight:700">${order.id}</span>
          ${conflicting?'<span style="font-size:9px;color:var(--red)">⚠ ชน</span>':''}
        </div>
        <div style="font-size:10px;color:var(--txt2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
          ${order.customer?order.customer+' ':''}<span style="color:var(--txt3)">${order.kva?order.kva+'kVA':order.product.slice(0,14)}</span>
        </div>
        <div style="font-size:9px;margin-top:1px;color:${order.isLate?'var(--red)':'var(--green)'};font-weight:600">
          ${order.isLate ? `⚠ เกิน ${order.lateDays} วัน` : `✓ ทัน ${fmtDate(order.orderEnd)}`}
        </div>
      </div>
      <!-- Bar area -->
      <div style="flex:1;height:${ROW_H}px;position:relative;overflow:hidden">
        <!-- Today line -->
        <div style="position:absolute;left:0;top:0;width:2px;height:100%;background:rgba(224,156,42,.5);z-index:3"></div>
        ${bars}
        ${dlMarker}
      </div>
    </div>`;
  }).join('');

  const conflicts = detectConflicts(orders);

  return `
  <!-- Conflict alerts -->
  ${conflicts.length > 0 ? `
    <div style="margin-bottom:12px">
      ${conflicts.map(c => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(224,90,78,.08);border:1px solid rgba(224,90,78,.2);border-radius:8px;font-size:12px;margin-bottom:6px">
          <span style="font-size:16px">⚠</span>
          <div>
            <strong style="color:var(--red)">${c.wc} — ชนกัน</strong>
            <span style="color:var(--txt2);margin-left:8px">${c.orders.join(' + ')} ใช้ ${c.wc} ช่วงเดียวกัน → ${fmtDate(c.start)} ถึง ${fmtDate(c.end)}</span>
          </div>
        </div>`).join('')}
    </div>` : `
    <div style="padding:8px 12px;background:rgba(76,175,125,.07);border:1px solid rgba(76,175,125,.2);border-radius:8px;font-size:12px;margin-bottom:12px;color:var(--green)">
      ✓ ไม่มี WC ชนกัน — ทุก Order สามารถดำเนินการพร้อมกันได้
    </div>`}

  <!-- Gantt grid -->
  <div style="border:1px solid var(--bord2);border-radius:10px;overflow:hidden;background:var(--bg2)">
    <!-- Week header -->
    <div style="display:flex;border-bottom:1px solid var(--bord)">
      <div style="width:${LABEL_W}px;flex-shrink:0;border-right:1px solid var(--bord2);padding:4px 10px;font-size:10px;color:var(--txt3);background:var(--bg3)">Order / รุ่น</div>
      <div style="display:flex;overflow:hidden">${weekHeaders}</div>
    </div>
    <!-- Day header -->
    <div style="display:flex;border-bottom:1px solid var(--bord2)">
      <div style="width:${LABEL_W}px;flex-shrink:0;border-right:1px solid var(--bord2);background:var(--bg3)"></div>
      <div style="display:flex;overflow:hidden">${dayHeaders}</div>
    </div>
    <!-- Rows -->
    ${rows}
  </div>

  <!-- Legend -->
  <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap;font-size:11px;color:var(--txt2)">
    ${orders.map(o=>`<div style="display:flex;align-items:center;gap:5px">
      <div style="width:12px;height:12px;border-radius:2px;background:${o.color}"></div>
      <span style="font-family:var(--mono)">${o.id}</span> ${o.customer||o.product.slice(0,16)}
    </div>`).join('')}
    <div style="display:flex;align-items:center;gap:5px;margin-left:auto">
      <div style="width:2px;height:12px;background:var(--red)"></div><span>Deadline</span>
      <div style="width:2px;height:12px;background:rgba(224,156,42,.6);margin-left:8px"></div><span>วันนี้</span>
    </div>
  </div>`;
}

function buildWCGantt() {
  const { orders, wcTimeline, spanDays } = scheduleOrders();
  const today  = new Date(); today.setHours(0,0,0,0);
  const CELL   = 28;
  const ROW_H  = 38;
  const LABEL_W = 170;
  const totalDays = Math.min(spanDays, 90);

  // Day headers
  let dayHeaders = '';
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const dow = d.getDay();
    const isHol = !!isHoliday(d);
    const isSat = dow === 6; const isSun = dow === 0;
    const bg = isHol?'rgba(224,90,78,.12)':isSat?'rgba(224,156,42,.06)':isSun?'rgba(224,90,78,.06)':'transparent';
    dayHeaders += `<div style="width:${CELL}px;flex-shrink:0;text-align:center;font-size:9px;
      color:${isHol?'var(--red)':isSat?'var(--amber)':isSun?'rgba(224,90,78,.4)':'var(--txt3)'};
      background:${bg};border-right:1px solid var(--bord);padding:3px 0">${d.getDate()}</div>`;
  }

  // WC rows — only WCs that have scheduled work
  const activeWCs = Object.keys(wcTimeline).sort();
  const rows = activeWCs.map(wc => {
    const ops = wcTimeline[wc];
    // detect overlaps within this WC
    const hasConflict = ops.some((a,i) => ops.some((b,j) =>
      i!==j && a.startDate < b.endDate && b.startDate < a.endDate
    ));

    const bars = ops.map(op => {
      const left  = Math.round((op.startDate - today) / 86400000) * CELL;
      const width = Math.max(CELL, Math.round((op.endDate - op.startDate) / 86400000 + 1) * CELL);
      if (left > totalDays * CELL) return '';
      return `<div title="${op.orderId}: ${op.name} (${op.effHrs}h)\n${fmtDate(op.startDate)} → ${fmtDate(op.endDate)}"
        style="position:absolute;left:${Math.max(0,left)}px;width:${Math.min(width, totalDays*CELL-Math.max(0,left))}px;
               top:6px;height:24px;border-radius:3px;
               background:${op.color};opacity:.85;
               display:flex;align-items:center;padding:0 5px;
               font-size:9px;font-weight:700;color:#000;
               white-space:nowrap;overflow:hidden;cursor:pointer;
               border:1px solid rgba(255,255,255,.15)">
        ${op.orderId}
      </div>`;
    }).join('');

    const info = getLoadPercent(wc);
    return `<div style="display:flex;border-bottom:1px solid var(--bord)">
      <div style="width:${LABEL_W}px;flex-shrink:0;padding:0 10px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--bord2);background:var(--bg2)">
        <div style="display:flex;align-items:center;gap:5px">
          <span style="font-family:var(--mono);font-size:10px;color:var(--amber);font-weight:700">${wc}</span>
          ${hasConflict?'<span style="font-size:9px;color:var(--red)">⚠ ชน</span>':''}
        </div>
        <div style="font-size:9px;color:var(--txt2);margin-top:1px">${WC_CONFIG[wc]?.name||wc}</div>
        <div style="font-size:9px;margin-top:1px">
          <span class="badge ${loadClass(info.pct)}" style="font-size:8px">${info.pct}%</span>
          <span style="color:var(--txt3);margin-left:4px">Eff ${WC_CONFIG[wc]?.eff||90}%</span>
        </div>
      </div>
      <div style="flex:1;height:${ROW_H}px;position:relative;overflow:hidden">
        <div style="position:absolute;left:0;top:0;width:2px;height:100%;background:rgba(224,156,42,.5);z-index:3"></div>
        ${bars}
      </div>
    </div>`;
  }).join('');

  return `
  <div style="border:1px solid var(--bord2);border-radius:10px;overflow:hidden;background:var(--bg2)">
    <div style="display:flex;border-bottom:1px solid var(--bord2)">
      <div style="width:${LABEL_W}px;flex-shrink:0;border-right:1px solid var(--bord2);padding:5px 10px;font-size:10px;color:var(--txt3);background:var(--bg3)">Work Center</div>
      <div style="display:flex;overflow:hidden">${dayHeaders}</div>
    </div>
    ${activeWCs.length === 0
      ? `<div style="padding:32px;text-align:center;color:var(--txt3)">ยังไม่มีงานในระบบ</div>`
      : rows}
  </div>

  <!-- Order color legend -->
  <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;font-size:11px;color:var(--txt2)">
    ${orders.map(o=>`<div style="display:flex;align-items:center;gap:5px">
      <div style="width:12px;height:12px;border-radius:2px;background:${o.color}"></div>
      <span style="font-family:var(--mono)">${o.id}</span> ${o.customer||o.product.slice(0,14)}
    </div>`).join('')}
  </div>`;
}

function detectConflicts(orders) {
  const conflicts = [];
  const wcOps = {};
  for (const order of orders) {
    for (const op of order.ops) {
      if (!wcOps[op.wc]) wcOps[op.wc] = [];
      wcOps[op.wc].push({ ...op, orderId: order.id });
    }
  }
  for (const [wc, ops] of Object.entries(wcOps)) {
    for (let i = 0; i < ops.length; i++) {
      for (let j = i+1; j < ops.length; j++) {
        const a = ops[i], b = ops[j];
        if (a.orderId !== b.orderId &&
            a.startDate < b.endDate && b.startDate < a.endDate) {
          const overlapStart = new Date(Math.max(a.startDate, b.startDate));
          const overlapEnd   = new Date(Math.min(a.endDate,   b.endDate));
          conflicts.push({
            wc, orders: [a.orderId, b.orderId],
            start: overlapStart, end: overlapEnd,
          });
        }
      }
    }
  }
  return conflicts;
}

let activeDept = 'ประกอบภายใน';

function renderDept() {
  const dept  = EE_DEPARTMENTS[activeDept];
  const today = new Date();

  // Get Master Plan orders for this dept
  const deptOrders = ACCEPTED.filter(o => dept.relevant_products.includes(o.product));

  // Compute load per WC (open SAP + master plan)
  const wcEntries = Object.entries(dept.wcs);

  // Capacity per WC per week
  function deptCap(wc) {
    const cfg = WC_CONFIG[wc] || { workers: dept.wcs[wc]?.workers||3, hrs:8, sat_hrs:4, eff:88 };
    return cfg.workers * (5 * cfg.hrs + 1 * (cfg.sat_hrs||4));
  }

  function deptLoad(wc) {
    const base = dept.wcs[wc]?.open_load || 0;
    const mp   = deptOrders.reduce((a,o) => {
      const p = PRODUCTS[o.product];
      if (!p) return a;
      return a + p.ops.filter(op=>op.wc===wc).reduce((s,op)=>s+effectiveHrs(wc,op.hrs)*o.qty, 0);
    }, 0);
    return base + mp;
  }

  // Summary numbers
  const totalCap  = wcEntries.reduce((a,[wc]) => a + deptCap(wc), 0);
  const totalLoad = wcEntries.reduce((a,[wc]) => a + deptLoad(wc), 0);
  const overloaded = wcEntries.filter(([wc]) => deptLoad(wc)/deptCap(wc) >= 1).length;
  const urgentOrders = deptOrders.filter(o => {
    const d = Math.round((new Date(o.deadline)-today)/86400000);
    return d < 7;
  }).length;

  return `<div class="panel" style="max-width:100%">

    <!-- Dept selector -->
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
      ${Object.entries(EE_DEPARTMENTS).map(([name, d]) => `
        <button class="tab ${activeDept===name?'active':''}"
          onclick="activeDept='${name}';setTab('dept')"
          style="${activeDept===name?'':''}border-left:3px solid ${d.color}">
          ${name}
          <span style="font-size:9px;opacity:.7;margin-left:4px">${d.code}xx</span>
          ${name==='ประกอบภายใน'?'':'<span style="font-size:9px;background:var(--bg4);padding:1px 5px;border-radius:3px;margin-left:4px">เร็วๆนี้</span>'}
        </button>`).join('')}
    </div>

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div style="width:4px;height:40px;border-radius:2px;background:${dept.color};flex-shrink:0"></div>
      <div>
        <div style="font-size:16px;font-weight:600">แผนก ${activeDept} — ${dept.code}xx</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">
          ${Object.keys(dept.wcs).join(' · ')} · ${Object.keys(dept.wcs).length} Work Centers
        </div>
      </div>
    </div>

    <!-- KPI row -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
      <div class="mc"><div class="mc-label">Orders ในแผนก</div><div class="mc-val" style="color:${dept.color}">${deptOrders.length}</div><div class="mc-sub">จาก Master Plan</div></div>
      <div class="mc"><div class="mc-label">Load รวม (hrs)</div><div class="mc-val" style="color:${totalLoad/totalCap>=1?'var(--red)':totalLoad/totalCap>=.8?'var(--amber)':'var(--green)'}">${Math.round(totalLoad)}</div><div class="mc-sub">Cap ${totalCap}h/สัปดาห์</div></div>
      <div class="mc"><div class="mc-label">WC เกิน Capacity</div><div class="mc-val" style="color:${overloaded>0?'var(--red)':'var(--green)'}">${overloaded}</div><div class="mc-sub">จาก ${wcEntries.length} WC</div></div>
      <div class="mc"><div class="mc-label">Orders เร่งด่วน</div><div class="mc-val" style="color:${urgentOrders>0?'var(--red)':'var(--txt2)'}">${urgentOrders}</div><div class="mc-sub">deadline < 7 วัน</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">

      <!-- WC Load cards -->
      <div>
        <div class="card-title" style="font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px">Work Center Load</div>
        ${wcEntries.map(([wc, cfg]) => {
          const load = deptLoad(wc);
          const cap  = deptCap(wc);
          const pct  = Math.round(load/cap*100);
          const col  = pct>=100?'var(--red)':pct>=80?'var(--amber)':'var(--green)';
          const eff  = WC_CONFIG[wc]?.eff || 88;
          const mpLoad = deptOrders.reduce((a,o)=>{
            const p=PRODUCTS[o.product]; if(!p) return a;
            return a+p.ops.filter(op=>op.wc===wc).reduce((s,op)=>s+effectiveHrs(wc,op.hrs)*o.qty,0);
          },0);
          return `<div class="card" style="padding:12px;margin-bottom:8px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <div>
                <span style="font-family:var(--mono);font-size:11px;color:${dept.color};font-weight:700">${wc}</span>
                <span style="font-size:11px;color:var(--txt2);margin-left:8px">${cfg.name}</span>
              </div>
              <span class="badge ${loadClass(pct)}">${pct}%</span>
            </div>
            <!-- Stacked bar: SAP open + Master Plan -->
            <div style="height:10px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:6px;position:relative">
              <div style="position:absolute;left:0;top:0;height:100%;width:${Math.min((cfg.open_load/cap)*100,100)}%;background:${col};opacity:.5;border-radius:4px"></div>
              <div style="position:absolute;left:${Math.min((cfg.open_load/cap)*100,100)}%;top:0;height:100%;width:${Math.min((mpLoad/cap)*100,100-Math.min((cfg.open_load/cap)*100,100))}%;background:${dept.color};border-radius:0 4px 4px 0"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--txt3)">
              <span>SAP open <strong style="font-family:var(--mono);color:var(--txt2)">${cfg.open_load.toFixed(0)}h</strong></span>
              <span>+MasterPlan <strong style="font-family:var(--mono);color:${dept.color}">${mpLoad.toFixed(0)}h</strong></span>
              <span>Cap <strong style="font-family:var(--mono)">${cap}h</strong></span>
              <span>Eff <strong style="color:${eff>=90?'var(--green)':eff>=80?'var(--amber)':'var(--red)'}">${eff}%</strong></span>
            </div>
          </div>`;
        }).join('')}
      </div>

      <!-- Orders queue -->
      <div>
        <div class="card-title" style="font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px">Order Queue — Master Plan</div>
        <div class="card" style="padding:0">
          <div style="max-height:420px;overflow-y:auto">
            ${deptOrders.length===0
              ? `<div style="padding:24px;text-align:center;color:var(--txt3)">ไม่มี order ใน Master Plan</div>`
              : deptOrders.map(o => {
                  const dl = new Date(o.deadline);
                  const daysLeft = Math.round((dl-today)/86400000);
                  const urgent   = daysLeft < 0;
                  const warn     = daysLeft >= 0 && daysLeft < 7;
                  const p = PRODUCTS[o.product];
                  const deptHrs = p?.ops.filter(op=>Object.keys(dept.wcs).includes(op.wc)).reduce((a,op)=>a+op.hrs*o.qty,0)||0;
                  const catColor = o.category==='หลัก'?'var(--blue)':o.category==='Fast'?'var(--red)':'var(--green)';
                  return `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--bord);font-size:12px">
                    <div style="flex-shrink:0;width:4px;height:36px;border-radius:2px;background:${urgent?'var(--red)':warn?'var(--amber)':'var(--bord2)'}"></div>
                    <div style="flex:1;min-width:0">
                      <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
                        <span style="font-family:var(--mono);font-size:10px;color:${dept.color};font-weight:700">${o.id}</span>
                        <span style="font-size:9px;color:${catColor};font-weight:700">${o.category}</span>
                        ${urgent?`<span class="badge b-red">เกิน ${Math.abs(daysLeft)} วัน</span>`:warn?`<span class="badge b-warn">เร่งด่วน</span>`:''}
                      </div>
                      <div style="font-size:11px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.customer} — ${o.kva}kVA × ${o.qty}</div>
                      <div style="font-size:10px;color:var(--txt3);margin-top:1px">${o.sap_so}${o.comment?' · '+o.comment:''}</div>
                    </div>
                    <div style="text-align:right;flex-shrink:0">
                      <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:${urgent?'var(--red)':warn?'var(--amber)':'var(--txt)'}">${deptHrs.toFixed(1)}h</div>
                      <div style="font-size:9px;color:var(--txt3)">แผนก ${activeDept}</div>
                      <div style="font-size:10px;color:${urgent?'var(--red)':warn?'var(--amber)':'var(--txt3)'}">
                        ${urgent?'⚠ เกิน':''} ${dl.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})}
                      </div>
                    </div>
                  </div>`;
                }).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- Operations breakdown — all 4 departments -->
    <div class="card">
      <div class="card-title" style="font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--txt3);text-transform:uppercase;margin-bottom:10px">
        ขั้นตอนงาน ${activeDept} (${dept.code}xx) — STD Hours ต่อขนาดหม้อแปลง
      </div>
      ${dept.ops_template.length === 0
        ? `<div style="text-align:center;padding:2rem;color:var(--txt3)">ยังไม่มีข้อมูล operation</div>`
        : `<div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead>
            <tr style="border-bottom:1px solid var(--bord2)">
              <th style="text-align:left;padding:7px 10px;color:var(--txt3);font-size:10px;font-weight:700;width:72px">WC</th>
              <th style="text-align:left;padding:7px 10px;color:var(--txt3);font-size:10px;font-weight:700">Operation</th>
              <th style="text-align:center;padding:7px 10px;color:var(--blue);font-size:10px;font-weight:700">≤400kVA</th>
              <th style="text-align:center;padding:7px 10px;color:var(--amber);font-size:10px;font-weight:700">500–3500kVA</th>
              <th style="text-align:center;padding:7px 10px;color:var(--red);font-size:10px;font-weight:700">≥7000kVA</th>
            </tr>
          </thead>
          <tbody>
            ${dept.ops_template.map((op, i) => {
              const prevWC = i>0 ? dept.ops_template[i-1].wc : null;
              const showWC = op.wc !== prevWC;
              return `<tr style="border-bottom:1px solid var(--bord)${showWC&&i>0?';border-top:2px solid var(--bord2)':''}">
                <td style="padding:6px 10px;font-family:var(--mono);font-size:10px;color:${dept.color};font-weight:${showWC?700:400};visibility:${showWC?'visible':'hidden'}">${op.wc}</td>
                <td style="padding:6px 10px;color:var(--txt2)">${op.name}</td>
                <td style="text-align:center;padding:6px 10px;font-family:var(--mono);color:var(--blue)">${op.std_small}h</td>
                <td style="text-align:center;padding:6px 10px;font-family:var(--mono);color:var(--amber)">${op.std_med}h</td>
                <td style="text-align:center;padding:6px 10px;font-family:var(--mono);color:var(--red)">${op.std_large}h</td>
              </tr>`;
            }).join('')}
            <tr style="border-top:2px solid var(--bord2);background:rgba(255,255,255,.03)">
              <td colspan="2" style="padding:8px 10px;font-weight:600;color:var(--txt2)">รวมทั้งหมด</td>
              <td style="text-align:center;padding:8px 10px;font-family:var(--mono);font-weight:700;color:var(--blue)">
                ${dept.ops_template.reduce((a,o)=>a+o.std_small,0).toFixed(2)}h
              </td>
              <td style="text-align:center;padding:8px 10px;font-family:var(--mono);font-weight:700;color:var(--amber)">
                ${dept.ops_template.reduce((a,o)=>a+o.std_med,0).toFixed(2)}h
              </td>
              <td style="text-align:center;padding:8px 10px;font-family:var(--mono);font-weight:700;color:var(--red)">
                ${dept.ops_template.reduce((a,o)=>a+o.std_large,0).toFixed(2)}h
              </td>
            </tr>
          </tbody>
        </table>
      </div>`}
    </div>
  </div>`;
}

      </div>
