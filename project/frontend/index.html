function kvaKey(kva) {
  if (kva<=75) return '50kVA'; if (kva<=175) return '160kVA';
  if (kva<=350) return '300kVA'; if (kva<=750) return '630kVA';
  if (kva<=1400) return '1000kVA'; if (kva<=2500) return '2000kVA';
  if (kva<=4500) return '3500kVA'; return '7000kVA+';
}
const DEPT_ORDER_PROC = ['Core','Coil','Insulation','Parts','Assembly','Fitting','QCTest','TankBody','Box','Paint','FinFold','PowerTR'];
const DEPT_LABEL_PROC = {Core:'แกนเหล็ก',Coil:'พันคอยล์',Assembly:'ประกอบภายใน',Fitting:'ติดอุปกรณ์',Parts:'ชิ้นส่วน',Insulation:'ฉนวน',QCTest:'QC/Test',TankBody:'ตัวถัง',Box:'Box',Paint:'งานสี',FinFold:'ครีบ/พับ',PowerTR:'Power TR'};
const DEPT_COL_PROC = {Core:'#c07800',Coil:'#1a7a4a',Assembly:'#1a5fc0',Fitting:'#6c3da8',Parts:'#6a7888',Insulation:'#2a8898',QCTest:'#c0392b',TankBody:'#8b5e3c',Box:'#7a6040',Paint:'#9a5c38',FinFold:'#5a8040',PowerTR:'#b03020'};

function buildProcessSteps(item) {
  const k = kvaKey(item.kva);
  const steps = [];
  DEPT_ORDER_PROC.forEach(dept => {
    (TD_OPS[dept]||[]).forEach(op => {
      const hrs = op[k]||0;
      if (hrs>0) steps.push({dept, wc:op.wc, op_no:op.op_no, name:op.op, hrs});
    });
  });
  return steps.sort((a,b)=>{
    const d = DEPT_ORDER_PROC.indexOf(a.dept)-DEPT_ORDER_PROC.indexOf(b.dept);
    return d!==0?d:a.op_no-b.op_no;
  });
}

const TD_OP_KVA = ['50kVA','160kVA','300kVA','630kVA','1000kVA','2000kVA','3500kVA','7000kVA+'];
const TD_OP_ALL = [];
Object.entries(TD_OPS).forEach(([dept,ops])=>ops.forEach(o=>TD_OP_ALL.push({dept,...o})));
const TD_OP_MAX = {};
TD_OP_KVA.forEach(k=>{ TD_OP_MAX[k]=Math.max(...TD_OP_ALL.map(r=>r[k]||0)); });

let opSortKey = 'op_no', opSortDir = 1;

function opHeatBg(v,mx){
  if(!v)return'';const p=v/mx;
  return p>=.8?'rgba(224,90,78,.55)':p>=.5?'rgba(224,156,42,.45)':p>=.2?'rgba(91,142,240,.38)':'rgba(76,175,125,.28)';
}

function renderOpTable() {
  const dept   = document.getElementById('op-dept-filter')?.value || 'All';
  const search = (document.getElementById('op-search')?.value || '').toLowerCase();
  const kvaHi  = tdKva;

  let rows = TD_OP_ALL;
  if (dept !== 'All') rows = rows.filter(r => r.dept === dept);
  if (search) rows = rows.filter(r =>
    r.op.toLowerCase().includes(search) ||
    r.wc.toLowerCase().includes(search) ||
    String(r.op_no).includes(search) ||
    r.dept.toLowerCase().includes(search)
  );

  rows = [...rows].sort((a,b)=>{
    let av=a[opSortKey]||0, bv=b[opSortKey]||0;
    if(typeof av==='string') return av.localeCompare(bv)*opSortDir;
    return (av-bv)*opSortDir;
  });

  const arrow = k => opSortKey===k?(opSortDir>0?'↑':'↓'):'';
  const setSort = k => `opSortKey=opSortKey==='${k}'?(opSortDir*=-1,opSortKey):('${k}',(opSortDir=1,opSortKey));renderOpTable()`;

  const wrap = document.getElementById('op-table-wrap');
  if (!wrap) return;

  wrap.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead style="position:sticky;top:0;z-index:1">
      <tr style="border-bottom:1px solid var(--bord2)">
        <th style="text-align:center;padding:6px;background:var(--bg3);color:var(--txt3);font-size:10px;font-weight:600;width:46px;cursor:pointer" onclick="opSortKey='op_no';opSortDir=opSortKey==='op_no'?opSortDir*-1:1;renderOpTable()">Op No ${arrow('op_no')}</th>
        <th style="text-align:left;padding:6px;background:var(--bg3);color:var(--txt3);font-size:10px;font-weight:600;width:60px;cursor:pointer" onclick="opSortKey='wc';opSortDir=opSortKey==='wc'?opSortDir*-1:1;renderOpTable()">WC ${arrow('wc')}</th>
        <th style="text-align:left;padding:6px;background:var(--bg3);color:var(--txt3);font-size:10px;font-weight:600;width:88px">Dept</th>
        <th style="text-align:left;padding:6px;background:var(--bg3);color:var(--txt3);font-size:10px;font-weight:600;cursor:pointer" onclick="opSortKey='op';opSortDir=opSortKey==='op'?opSortDir*-1:1;renderOpTable()">Operation ${arrow('op')}</th>
        ${TD_OP_KVA.map(k=>`<th style="text-align:center;padding:6px;background:${k===kvaHi?'rgba(224,156,42,.12)':'var(--bg3)'};color:${k===kvaHi?'var(--amber)':'var(--txt3)'};font-size:10px;font-weight:600;min-width:48px;cursor:pointer;border:${k===kvaHi?'1px solid rgba(224,156,42,.3)':'none'}" onclick="opSortKey='${k}';opSortDir=opSortKey==='${k}'?opSortDir*-1:1;renderOpTable()">${k} ${arrow(k)}</th>`).join('')}
      </tr>
    </thead>
    <tbody>
      ${rows.length===0
        ? `<tr><td colspan="${4+TD_OP_KVA.length}" style="text-align:center;padding:20px;color:var(--txt3)">ไม่พบ operation ที่ตรงกัน</td></tr>`
        : rows.map(r=>{
          const col = TD_COL[r.dept]||'#888';
          return `<tr style="border-bottom:0.5px solid var(--bord)">
            <td style="text-align:center;padding:5px 6px">
              <span style="display:inline-block;font-size:9px;font-family:var(--mono);padding:2px 5px;border-radius:4px;background:var(--bg3);color:var(--txt2);font-weight:700">${r.op_no}</span>
            </td>
            <td style="padding:5px 6px;font-family:var(--mono);font-size:10px;color:${col};font-weight:700">${r.wc}</td>
            <td style="padding:5px 6px">
              <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${col};margin-right:4px"></span>
              <span style="font-size:10px;color:var(--txt2)">${r.dept}</span>
            </td>
            <td style="padding:5px 6px;color:var(--txt2);font-size:11px">${r.op}</td>
            ${TD_OP_KVA.map(k=>{
              const v=r[k]||0;
              const bg=v?opHeatBg(v,TD_OP_MAX[k]):'';
              const isSel=k===kvaHi;
              return `<td style="text-align:center;padding:5px 6px;font-family:var(--mono);font-size:11px;${bg?`background:${bg};`:''}${isSel?'font-weight:700;border-left:1px solid rgba(224,156,42,.3);border-right:1px solid rgba(224,156,42,.3);':''}">${v>0?v:'—'}</td>`;
            }).join('')}
          </tr>`;
        }).join('')}
    </tbody>
  </table>`;
}

function renderTimeDashboard_hook() {
  setTimeout(()=>{ if(document.getElementById('op-table-wrap')) renderOpTable(); }, 50);
}

// Map catalog to nearest PRODUCTS template by kVA
function catalogToTemplate(cat) {
  // Use cat.template directly — already mapped in CATALOG data
  return cat.template;
}

// Pre-fill simulate from catalog item and switch tab
function simulateFromCatalog(id) {
  const item = CATALOG.find(c => c.id === id);
  if (!item) return;
  // Store selected catalog item for simulate
  window._catalogSelected = item;
  setTab('simulate');
  setTimeout(() => {
    const sel = document.getElementById('sim-product');
    if (sel) {
      sel.value = item.template;
      onSimChange();
    }
    // Update hint to show catalog-specific STD
    const hint = document.getElementById('sim-hrs-hint');
    if (hint) hint.innerHTML = `<span style="color:var(--amber)">📚 ${item.desc} — SAP STD: <strong>${item.std}h</strong>/unit</span>`;
    // Auto-scroll to top
    document.querySelector('.panel')?.scrollTo(0,0);
  }, 80);
}

let catSort = 'kva', catDir = 1, catFilter = 'All', catSearch = '';

  const GROUPS = [
    {label:'All',min:0,max:99999},
    {label:'≤160kVA',min:10,max:175,col:'#1a5fc0'},
    {label:'300–630kVA',min:176,max:750,col:'#1a7a4a'},

    {label:'3000kVA+',min:2501,max:99999,col:'#c0392b'},
  ];
  const MAX_STD = Math.max(...CATALOG.map(c=>c.std));

  let rows = [...CATALOG];
  if (catFilter !== 'All') {
    const g = GROUPS.find(g=>g.label===catFilter);
    if (g) rows = rows.filter(r=>r.kva>=g.min && r.kva<=g.max);

  if (catSearch) {
    const q = catSearch.toLowerCase();
    rows = rows.filter(r =>
      String(r.kva).includes(q) ||
      r.desc.toLowerCase().includes(q) ||
      r.voltage.includes(q) ||
      r.vector.toLowerCase().includes(q) ||
      r.phase.includes(q)
    );
  }
  rows.sort((a,b)=>{
    let av=a[catSort]||0, bv=b[catSort]||0;
    return typeof av==='string'?av.localeCompare(bv)*catDir:(av-bv)*catDir;

  const arrow = k => catSort===k?(catDir>0?'↑':'↓'):'';

// ── Item Code Decoder (EN-T-001) ─────────────────────────────
const IC_TYPE = {'1':'3Ph Conservator','C':'3Ph Conservator (High Loss)','2':'3Ph N₂ Gas Sealed','N':'3Ph N₂ Gas Sealed (High Loss)','3':'3Ph Hermetically Sealed (Full Oil)','F':'3Ph Full Oil (High Loss)','4':'3Ph Cast Resin','5':'3Ph Pad Mounted','6':'Dry Type Class H','8':'Special Type','9':'1 Phase','T':'Dry Type Class H','U':'1 Phase (เทพารักษ์)'};
const IC_GH = {'01':'0–1,000 V','03':'3,300 V','06':'6,600 V','10':'1,001–10,999 V','11':'11,000 V','12':'12,000 V','19':'19,000 V','20':'11,001–21,999 V','22':'22,000 V','24':'24,000 V','30':'22,001–32,999 V','33':'33,000–36,000 V','40':'11kV / 22kV (Dual)','42':'12kV / 24kV (Dual)','50':'36,001–50,000 V','60':'>50,001 V'};
const IC_GRP = {'A':'Ekarat Std — Foil Winding','B':'Ekarat Std — Foil + Box 1','C':'Ekarat Std — Wire Winding','D':'Ekarat Std — Wire + Box 1','E':'PEA Std — Foil Winding','F':'PEA Std — Wire Winding','G':'PEA Evaluated Cost (Foil)','H':'Aluminum HV Winding','I':'MEA Std — Foil Winding','J':'MEA Std — Wire Winding','K':'Export Std — Foil Winding','L':'Aluminum HV+LV Winding','M':'Export Std — Wire Winding','N':'Export Std — Wire + Box 1','S':'Special Add-on (Cable Box / Control / Conservator)'};

function decodeKva(cdef) {
  if (!cdef||cdef.length<4) return null;
  const c=parseInt(cdef[0]), def=parseInt(cdef.slice(1));
  if (isNaN(c)||isNaN(def)) return null;
  const kva = def * Math.pow(10, c) / 1000;  // FIX: correct kVA calc
  return kva % 1 === 0 ? kva.toFixed(0) : kva.toFixed(1);
}
function encodeKva(kva) {
  const va = kva * 1000;
  for (let c = 2; c <= 6; c++) {
    const def = va / Math.pow(10, c);
    if (def >= 1 && def <= 999 && Number.isInteger(def))
      return `${c}${String(Math.round(def)).padStart(3,'0')}`;
  }
  return null;
}
function decodeItemCode(code) {
  code = code.trim().toUpperCase().replace(/\s/g,'');
  if (code.length < 8) return null;
  const A=code[0], B=code[1], CDEF=code.slice(2,6), GH=code.slice(6,8), rest=code.slice(8), I=rest[0]||'', run=rest.slice(1)||'';
  return {
    category: A==='5'?'หม้อแปลงสำเร็จรูป (Finished)':A==='4'?'90% Semi-finished':A,
    type:     IC_TYPE[B]||`Unknown (${B})`,
    kva:      decodeKva(CDEF),
    hv:       IC_GH[GH]||`Unknown GH=${GH}`,
    group:    IC_GRP[I]||(I?`Unknown (${I})`:'—'),
    running:  run||'—',
    raw: {A,B,CDEF,GH,I,run},
  };
}
function renderItemDecoderResult(code) {
  code = code.trim().toUpperCase();
  const r = decodeItemCode(code);
  if (!r) return `<div style="font-size:12px;color:var(--txt3)">รหัสสั้นเกินไป (ต้องการ 8+ หลัก)</div>`;
  const {A,B,CDEF,GH,I,run} = r.raw;
  const segs = [
    {chars:A,    label:'A',    color:'#c0392b', tip:r.category},
    {chars:B,    label:'B',    color:'#c07800', tip:r.type},
    {chars:CDEF, label:'CDEF', color:'#1a7a4a', tip:r.kva+' kVA'},
    {chars:GH,   label:'GH',   color:'#1a5fc0', tip:'HV: '+r.hv},
    {chars:I,    label:'I',    color:'#6c3da8', tip:r.group},
    {chars:run,  label:'J/KLM',color:'#7a6040', tip:'Running: '+r.running},
  ].filter(s=>s.chars);
  return `<div style="margin-bottom:10px">
    <div style="font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:600;letter-spacing:.06em">CODE BREAKDOWN</div>
    <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;align-items:flex-end">
      ${segs.map((s,i)=>`${i>0?'<div style="color:var(--bord2);font-size:14px;padding-bottom:16px">·</div>':''}<div style="display:flex;flex-direction:column;align-items:center">
        <div style="font-family:var(--mono);font-size:17px;font-weight:700;color:${s.color};padding:4px 8px;border-radius:6px;background:${s.color}12;border:1.5px solid ${s.color}40;letter-spacing:.12em;text-align:center">${s.chars}</div>
        <div style="font-size:9px;color:${s.color};font-weight:600;margin-top:2px">${s.label}</div>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      ${segs.map(s=>`<div style="font-size:10px;padding:2px 7px;border-radius:4px;background:${s.color}12;color:${s.color};border:0.5px solid ${s.color}30;white-space:nowrap">
        <strong>${s.label}:</strong> ${s.tip}
      </div>`).join('')}
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px">
    ${[['หมวดสินค้า (A)',r.category],['ประเภท (B)',r.type],['กำลังไฟฟ้า (CDEF)',r.kva+' kVA'],['แรงดันสูง (GH)',r.hv],['กลุ่ม/มาตรฐาน (I)',r.group],['Running No.',r.running]].map(([k,v])=>`<div style="padding:7px 10px;background:var(--bg3);border-radius:6px;border:1px solid var(--bord)">
      <div style="font-size:9px;color:var(--txt3);margin-bottom:2px">${k}</div>
      <div style="font-size:11px;font-weight:600;color:var(--txt)">${v}</div>
    </div>`).join('')}
  </div>
  <div style="padding:8px 12px;background:rgba(192,120,0,.06);border-radius:6px;border:1px solid rgba(192,120,0,.2);font-size:11px;line-height:1.7">
    <span style="font-family:var(--mono);font-weight:700;color:var(--amber);letter-spacing:.1em">${code}</span>
    <span style="color:var(--txt2);margin-left:10px">= ${r.kva} kVA · ${r.type} · HV ${r.hv} · ${r.group}</span>
  </div>`;
}

// ── Capacity Plan ────────────────────────────────────────────
let capWeekOffset = 0;
let capDayDetail  = null;

function jumpToDate(dateStr) {
  if (!dateStr) return;
  const picked = new Date(dateStr + 'T00:00:00');
  const dow = picked.getDay();
  const pickedMon = new Date(picked);
  pickedMon.setDate(picked.getDate() - (dow === 0 ? 6 : dow - 1));
  const todayMon = capMondayOfWeek(0);
  capWeekOffset = Math.round((pickedMon - todayMon) / 604800000);
  capDayDetail = null;
  setTab('capacity');
}

// Hours needed per WC per plan_date (effective, adjusted for efficiency)
function calcDailyDemand(orders) {
  const demand = {};
  for (const o of orders) {
    const date = o.plan_date;
    if (!date) continue;
    const prod = PRODUCTS[o.product];
    if (!prod?.ops) continue;
    const qty = o.qty || 1;
    if (!demand[date]) demand[date] = {};
    for (const op of prod.ops) {
      const eff = (WC_CONFIG[op.wc]?.eff || 90) / 100;
      demand[date][op.wc] = (demand[date][op.wc] || 0) + (op.hrs * qty / eff);
    }
  }
  return demand;
}

// Normal / OT / max capacity for one WC on one date
function getDayCapacity(wc, dateStr) {
  const cfg = WC_CONFIG[wc] || {workers:3, hrs:8, ot:4, sat_hrs:4, sat_ot:0};
  const dt  = new Date(dateStr + 'T00:00:00');
  const dow = dt.getDay(); // 0=Sun
  if (dow === 0) return {normal:0, ot_cap:0, max:0, workers:cfg.workers, stdHrs:0, otHrs:0, isClosed:true, isSat:false};
  const isSat  = dow === 6;
  const stdHrs = isSat ? (cfg.sat_hrs||4) : (cfg.hrs||8);
  const otHrs  = isSat ? (cfg.sat_ot||0) : (cfg.ot||4);
  const normal = cfg.workers * stdHrs;
  const ot_cap = cfg.workers * otHrs;
  return {normal, ot_cap, max:normal+ot_cap, workers:cfg.workers, stdHrs, otHrs, isSat, isClosed:false};
}

function capMondayOfWeek(offset) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow   = today.getDay() || 7;
  const mon   = new Date(today);
  mon.setDate(today.getDate() - (dow - 1) + offset * 7);
  return mon;
}
function capDateStr(dt) { return dt.toISOString().slice(0,10); }

function renderCapacityPlan() {
  const orders   = ACCEPTED.filter(o => o.plan_date);
  const demand   = calcDailyDemand(orders);
  const todayStr = capDateStr(new Date());

  // Week: Mon – Sat
  const monday   = capMondayOfWeek(capWeekOffset);
  const weekDays = Array.from({length:6}, (_,i) => { const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
  const wkStrs   = weekDays.map(capDateStr);
  const DOW_TH   = ['จ','อ','พ','พฤ','ศ','ส'];
  const MONTH_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const fmtDay   = d => `${d.getDate()} ${MONTH_TH[d.getMonth()]}`;
  const weekLabel = `${fmtDay(weekDays[0])} – ${fmtDay(weekDays[5])} ${weekDays[0].getFullYear()+543}`;

  // All WCs that have demand this week
  const activeWCs = new Set();
  wkStrs.forEach(ds => { if (demand[ds]) Object.keys(demand[ds]).forEach(w=>activeWCs.add(w)); });
  const wcList = [...activeWCs].sort();

  // Build per-WC row data
  let wkTotalDemand=0, wkTotalNormal=0, wkOTCount=0, wkOverCount=0;

  const wcRows = wcList.map(wc => {
    const cfg  = WC_CONFIG[wc] || {workers:3, name:wc, hrs:8, ot:4, sat_hrs:4, sat_ot:0};
    const cells = wkStrs.map(ds => {
      const dem = demand[ds]?.[wc] || 0;
      const cap = getDayCapacity(wc, ds);
      if (cap.isClosed) return {dem:0, cap, status:'closed'};
      const pct    = cap.normal>0 ? dem/cap.normal*100 : 0;
      const status = pct<=0?'empty':pct<=80?'ok':pct<=100?'warn':pct<=130?'ot':'over';
      const otNeeded    = Math.max(0, dem - cap.normal);
      const otPerPerson = cap.workers>0 ? otNeeded/cap.workers : 0;
      const perPerson   = cap.workers>0 ? dem/cap.workers : 0;
      const workersNeeded = cap.stdHrs>0 ? Math.ceil(dem/cap.stdHrs) : 0;
      wkTotalDemand += dem;
      wkTotalNormal += cap.normal;
      return {dem, cap, pct, status, otNeeded, otPerPerson, perPerson, workersNeeded};
    });
    const hasOT   = cells.some(c=>c.status==='ot');
    const hasOver = cells.some(c=>c.status==='over');
    if (hasOT)   wkOTCount++;
    if (hasOver) wkOverCount++;
    const wkDemand = cells.reduce((s,c)=>s+c.dem,0);
    const wkCap    = cells.reduce((s,c)=>s+c.cap.normal,0);
    return {wc, cfg, cells, hasOT, hasOver, wkDemand, wkCap};
  }).filter(r=>r.wkDemand>0);

  // Status colour helpers
  const SCOL  = {ok:'#1a7a4a',warn:'#c07800',ot:'#d06000',over:'#c0392b',empty:'var(--txt3)',closed:'var(--txt3)'};
  const SBG   = {ok:'rgba(26,122,74,.07)',warn:'rgba(192,120,0,.08)',ot:'rgba(208,96,0,.09)',over:'rgba(192,57,43,.09)',empty:'',closed:'var(--bg3)'};

  function cellHtml(cell, ds) {
    if (cell.status==='closed') return `<td style="border-bottom:1px solid var(--bord);background:var(--bg3)"><div style="text-align:center;color:var(--txt3);font-size:9px;padding:6px 4px">—</div></td>`;
    if (cell.status==='empty')  return `<td style="border-bottom:1px solid var(--bord)"><div style="text-align:center;color:var(--txt3);font-size:9px;padding:6px 4px">—</div></td>`;
    const {pct,dem,otNeeded,perPerson,status,workersNeeded,cap} = cell;
    const col = SCOL[status]; const bg = SBG[status];
    const isToday = ds===todayStr;
    return `<td style="border-bottom:1px solid var(--bord);background:${bg};cursor:pointer;${isToday?'border-top:2px solid var(--blue)':''}" onclick="capDayDetail='${ds}';setTab('capacity')">
      <div style="text-align:center;padding:5px 4px">
        <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:${col}">${dem.toFixed(1)}h</div>
        <div style="height:4px;background:var(--bg4);border-radius:2px;margin:3px auto;width:80%;overflow:hidden">
          <div style="height:100%;width:${Math.min(pct,100)}%;background:${col};border-radius:2px"></div>
        </div>
        <div style="font-size:8px;color:${col};line-height:1.3">
          ${pct.toFixed(0)}% · ${perPerson.toFixed(1)}h/คน
          ${otNeeded>0?`<br>OT +${otNeeded.toFixed(1)}h`:''}
        </div>
      </div>
    </td>`;
  }

  // Day detail panel
  let dayDetailHtml = '';
  if (capDayDetail) {
    const dayDem  = demand[capDayDetail] || {};
    const dayOrds = orders.filter(o=>o.plan_date===capDayDetail);
    const dt      = new Date(capDayDetail+'T00:00:00');
    const DOW_FULL = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
    const entries  = Object.entries(dayDem).sort((a,b)=>b[1]-a[1]);
    const dayTotal = entries.reduce((s,[,h])=>s+h,0);

    dayDetailHtml = `<div class="card" style="margin-bottom:12px;border-left:3px solid var(--blue)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <div>
          <div style="font-size:14px;font-weight:700">📅 ${capDayDetail} — วัน${DOW_FULL[dt.getDay()]}</div>
          <div style="font-size:11px;color:var(--txt2);margin-top:2px">
            ${dayOrds.length} orders · ${dayTotal.toFixed(1)} h demand รวม ·
            <span style="color:var(--txt3)">${dayOrds.map(o=>`${o.sap_so||o.id}(${o.effectiveKva||o.kva}kVA×${o.qty})`).join(' · ')}</span>
          </div>
        </div>
        <button onclick="capDayDetail=null;setTab('capacity')" class="btn-sm btn-ghost">✕ ปิด</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px">
        ${entries.map(([wc,dem])=>{
          const cap  = getDayCapacity(wc, capDayDetail);
          const cfg  = WC_CONFIG[wc] || {workers:3, name:wc, hrs:8};
          const pct  = cap.normal>0 ? dem/cap.normal*100 : 0;
          const st   = pct<=80?'ok':pct<=100?'warn':pct<=130?'ot':'over';
          const col  = SCOL[st];
          const otN  = Math.max(0, dem-cap.normal);
          const pp   = cfg.workers>0 ? dem/cfg.workers : 0;
          const otPP = cfg.workers>0 ? otN/cfg.workers : 0;
          const wkNeed = cap.stdHrs>0 ? Math.ceil(dem/cap.stdHrs) : 0;
          const verdict = st==='ok'?'✅ เพียงพอ':st==='warn'?'⚠ ใกล้เต็ม':st==='ot'?'🟡 ต้อง OT':'🔴 OT ไม่พอ';
          return `<div style="padding:9px 12px;background:var(--bg3);border-radius:8px;border-left:3px solid ${col}">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
              <span style="font-family:var(--mono);font-size:10px;font-weight:700;color:${col}">${wc}</span>
              <span style="font-size:10px;font-weight:700;font-family:var(--mono);color:${col}">${dem.toFixed(1)} h</span>
            </div>
            <div style="font-size:10px;color:var(--txt2);margin-bottom:5px">${cfg.name}</div>
            <div style="height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:6px">
              <div style="height:100%;width:${Math.min(pct,100)}%;background:${col}"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:9px;color:var(--txt3)">
              <div>คนมี: <strong style="color:var(--txt)">${cfg.workers}</strong></div>
              <div>คนต้องการ: <strong style="color:${wkNeed>cfg.workers?'var(--red)':'var(--green)'}">${wkNeed}</strong></div>
              <div>Load: <strong style="color:${col}">${pct.toFixed(0)}%</strong></div>
              <div>ต่อคน: <strong style="color:var(--txt)">${pp.toFixed(1)} h</strong></div>
              ${otN>0?`<div>OT รวม: <strong style="color:var(--red)">${otN.toFixed(1)} h</strong></div>
              <div>OT/คน: <strong style="color:var(--red)">${otPP.toFixed(1)} h</strong></div>`:''}
            </div>
            <div style="margin-top:5px;font-size:9px;font-weight:700;color:${col}">${verdict}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const noDataHtml = wcRows.length===0 ? `<div style="text-align:center;padding:48px;color:var(--txt3)">
    <div style="font-size:32px;margin-bottom:12px">📭</div>
    <div style="font-size:14px;font-weight:600">ไม่มี orders ในสัปดาห์นี้</div>
    <div style="font-size:12px;margin-top:6px">กด ← → เพื่อเปลี่ยนสัปดาห์ หรือ Import Excel ก่อน</div>
  </div>` : '';

  return `<div class="panel" style="max-width:100%;padding-bottom:2rem">
    <!-- Header & nav -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:17px;font-weight:700">⚡ Capacity Plan — ภาระงานตาม WC & วัน</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">
          คำนวณจาก ${orders.length} orders · กดเซลล์เพื่อดูรายละเอียดต่อ WC ต่อวัน
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <button onclick="capWeekOffset--;setTab('capacity')"
          style="padding:6px 12px;font-size:13px;border-radius:7px;border:1px solid var(--bord2);background:var(--bg2);cursor:pointer">←</button>
        <button onclick="capWeekOffset=0;capDayDetail=null;setTab('capacity')"
          style="padding:6px 12px;font-size:12px;border-radius:7px;border:1px solid var(--bord2);background:var(--bg3);cursor:pointer;font-weight:600">วันนี้</button>
        <button onclick="capWeekOffset++;setTab('capacity')"
          style="padding:6px 12px;font-size:13px;border-radius:7px;border:1px solid var(--bord2);background:var(--bg2);cursor:pointer">→</button>
        <div style="width:1px;height:24px;background:var(--bord2);margin:0 2px"></div>
        <input type="date" value="${capDateStr(monday)}"
          onchange="jumpToDate(this.value)"
          style="padding:5px 10px;font-size:12px;border-radius:7px;border:1px solid var(--bord2);background:var(--bg2);color:var(--txt);cursor:pointer;outline:none">
        <div style="width:1px;height:24px;background:var(--bord2);margin:0 2px"></div>
        <button onclick="capWeekOffset-=4;setTab('capacity')"
          style="padding:5px 10px;font-size:11px;border-radius:7px;border:1px solid var(--bord2);background:var(--bg2);cursor:pointer;color:var(--txt2)">−1 เดือน</button>

    </div>

    <!-- KPI -->
    ${wcRows.length>0?`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
      <div class="mc"><div class="mc-label">⏱ Demand สัปดาห์นี้</div><div class="mc-val" style="color:var(--amber)">${wkTotalDemand.toFixed(0)}<span style="font-size:11px">h</span></div><div class="mc-sub">Capacity ${wkTotalNormal.toFixed(0)}h</div></div>
      <div class="mc"><div class="mc-label">Load รวม</div><div class="mc-val" style="color:${wkTotalNormal>0&&wkTotalDemand/wkTotalNormal>1?'var(--red)':'var(--green)'}">${wkTotalNormal>0?(wkTotalDemand/wkTotalNormal*100).toFixed(0):0}%</div></div>

      </div>
    </div>`:''}
  </div>`;
}

// ── Employee Directory ───────────────────────────────────────
let empSearch='', empDeptFilter='All';
const DEPT_COLOR_EMP = {'31':'#e09c2a','32':'#4caf7d','33':'#5b8ef0','34':'#9b7fe8','35':'#8a8880','36':'#73b6c0','37':'#e03a3a','38':'#c07030','42':'#c0392b','51':'#c17d3c','52':'#a0845c','53':'#8b6c3c','54':'#c47c5a','56':'#7d9e5c','71':'#8a8880','11':'#6a9fd8','12':'#6a9fd8','13':'#6a9fd8','14':'#6a9fd8'};

function isEmpActive(e) {
  if (e.is_active === undefined || e.is_active === null) return true; // default active
  if (typeof e.is_active === 'boolean') return e.is_active;
  const s = String(e.is_active).trim().toLowerCase();
  return s === 'true' || s === '1' || s === 'yes' || s === 'active' || s === 'y';
}

function renderEmployees() {
  const depts = {};
  Object.entries(EMP_DIR).forEach(([wc, data]) => {
    const d = data.dept;
    if (!depts[d]) depts[d] = [];
    depts[d].push({ wc, ...data });
  });

  // Only active employees
  const isActive = e => isEmpActive(e);
  const totalAll    = Object.values(EMP_DIR).reduce((s,d) => s + d.employees.length, 0);
  const totalActive = Object.values(EMP_DIR).reduce((s,d) => s + d.employees.filter(isActive).length, 0);
  const totalInactive = totalAll - totalActive;

  // Largest WC by active count
  const wcCounts = Object.entries(EMP_DIR).map(([wc,d]) => [wc, d.employees.filter(isActive).length]);
  const [bigWC, bigCnt] = wcCounts.sort((a,b) => b[1]-a[1])[0] || ['—', 0];
  const bigName = WC_CONFIG[bigWC]?.name || '';

  const q = empSearch.toLowerCase();
  const matchEmp = e => isActive(e) && (!q || e.name.toLowerCase().includes(q) || (e.id||'').includes(q));

  let filteredDepts = {...depts};
  if (empDeptFilter !== 'All') {
    filteredDepts = {};
    if (depts[empDeptFilter]) filteredDepts[empDeptFilter] = depts[empDeptFilter];
  }
  const shownCount = Object.values(filteredDepts).flat().reduce((s,w) => s + w.employees.filter(matchEmp).length, 0);

  return `<div class="panel" style="max-width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:15px;font-weight:600">👥 Employee Directory</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">${totalActive} คน Active · ${Object.keys(EMP_DIR).length} Work Centers</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
      <div class="mc"><div class="mc-label">พนักงาน Active</div><div class="mc-val" style="color:var(--green)">${totalActive}</div></div>
      <div class="mc"><div class="mc-label">WC ใหญ่สุด</div><div class="mc-val" style="font-size:13px">${bigWC}</div><div class="mc-sub">${bigCnt} คน${bigName?' · '+bigName:''}</div></div>
      <div class="mc"><div class="mc-label">Work Centers</div><div class="mc-val">${Object.keys(EMP_DIR).length}</div></div>
      <div class="mc"><div class="mc-label">ไม่ Active</div><div class="mc-val" style="color:${totalInactive>0?'var(--txt3)':'var(--txt2)'}">${totalInactive}</div></div>
    </div>

    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <input type="text" placeholder="ค้นหาชื่อ / รหัสพนักงาน..." value="${empSearch}"
        oninput="empSearch=this.value;setTab('employees')"
        style="font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--bord2);background:var(--bg3);color:var(--txt);outline:none;width:220px">
      <select onchange="empDeptFilter=this.value;setTab('employees')"
        style="font-size:12px;padding:6px 10px;border-radius:8px;border:1px solid var(--bord2);background:var(--bg3);color:var(--txt)">
        <option value="All">ทุกแผนก</option>
        ${Object.entries(DEPT_NAME_MAP).sort((a,b)=>Number(a[0])-Number(b[0])).map(([k,v])=>
          `<option value="${k}" ${empDeptFilter===k?'selected':''}>${k} — ${v}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:var(--txt3)">แสดงเฉพาะ Is_Active = true</span>
    </div>

    ${Object.entries(filteredDepts).sort((a,b)=>Number(a[0])-Number(b[0])).map(([dept,wcs])=>{
      const deptEmps = wcs.flatMap(w => w.employees).filter(matchEmp);
      if (!deptEmps.length) return '';
      const col   = DEPT_COLOR_EMP[dept] || '#888';
      const dName = DEPT_NAME_MAP[dept] || dept;
      return `<div class="card" style="margin-bottom:10px;border-left:3px solid ${col}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font-size:13px;font-weight:600"><span style="color:${col}">Dept ${dept}</span> — ${dName}</div>
          <span class="badge b-b">${deptEmps.length} คน</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
          ${wcs.map(w => {
            const emps = w.employees.filter(matchEmp);
            if (!emps.length) return '';
            const wcCfg = WC_CONFIG[w.wc];
            return `<div style="background:var(--bg3);border-radius:8px;padding:10px;border:1px solid var(--bord)">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                <div>
                  <span style="font-family:var(--mono);font-size:10px;font-weight:700;color:${col}">${w.wc}</span>
                  ${wcCfg?`<span style="font-size:9px;color:var(--txt3);margin-left:4px">${wcCfg.name}</span>`:''}
                </div>
                <span style="font-size:10px;padding:1px 5px;border-radius:999px;background:${col}18;color:${col};font-weight:600">${emps.length}</span>
              </div>
              ${emps.map(e => `<div style="display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:0.5px solid var(--bord);font-size:11px">
                ${e.is_head
                  ? `<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(192,120,0,.15);color:var(--amber);font-weight:700;flex-shrink:0">หัวหน้า</span>`
                  : `<span style="width:30px;flex-shrink:0"></span>`}
                <span style="flex:1;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</span>
                <span style="font-family:var(--mono);font-size:9px;color:var(--txt3);flex-shrink:0">${(e.id||'').slice(-6)}</span>
              </div>`).join('')}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ── SAP Orders View ───────────────────────────────────────────
let expandedOrder = null;

const DEPT_COL_O = {Core:'#c07800',Coil:'#1a7a4a',Assembly:'#1a5fc0',Fitting:'#6c3da8',Parts:'#7a6888',Insulation:'#2a8898',QCTest:'#c0392b',TankBody:'#8b5e3c',Box:'#7a6040',Paint:'#9a5c38',FinFold:'#5a8040',PowerTR:'#b03020',Other:'#8a8880'};
const DEPT_LBL_O  = {Core:'Core',Coil:'Coil',Assembly:'Assembly',Fitting:'Fitting',Parts:'Parts',Insulation:'Insul.',QCTest:'QC/Test',TankBody:'Tank',Box:'Box',Paint:'Paint',FinFold:'Fin',PowerTR:'Power',Other:'Other'};

function renderOrders() {
  let rows = SAP_ORDERS;
  if (orderFilter==='late')   rows = rows.filter(o=>o.days<0);
  if (orderFilter==='urgent') rows = rows.filter(o=>o.days>=0&&o.days<=7);
  if (orderFilter==='active') rows = rows.filter(o=>o.conf<o.total);
  if (orderFilter==='done')   rows = rows.filter(o=>o.conf===o.total);
  if (orderSearch) {
    const q = orderSearch.toLowerCase();
    rows = rows.filter(o=>o.so.toLowerCase().includes(q)||o.order_no.includes(q)||o.material.toLowerCase().includes(q));
  }

  const lateCount   = SAP_ORDERS.filter(o=>o.days<0).length;
  const urgentCount = SAP_ORDERS.filter(o=>o.days>=0&&o.days<=7).length;
  const doneCount   = SAP_ORDERS.filter(o=>o.conf===o.total).length;

  return `<div class="panel" style="max-width:100%">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:15px;font-weight:600">📋 SAP Production Orders — ZP16</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">
          ${SAP_ORDERS.length} orders · SAP Routing จริง · กด order เพื่อดูขั้นตอนทั้งหมด
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
      <div class="mc"><div class="mc-label">Orders ทั้งหมด</div><div class="mc-val">${SAP_ORDERS.length}</div></div>
      <div class="mc"><div class="mc-label">🔴 เกิน Deadline</div><div class="mc-val" style="color:var(--red)">${lateCount}</div><div class="mc-sub">${(lateCount/SAP_ORDERS.length*100).toFixed(0)}% ของทั้งหมด</div></div>
      <div class="mc"><div class="mc-label">⚠ เร่งด่วน ≤7วัน</div><div class="mc-val" style="color:var(--amber)">${urgentCount}</div></div>
      <div class="mc"><div class="mc-label">✓ เสร็จแล้ว</div><div class="mc-val" style="color:var(--green)">${doneCount}</div></div>
    </div>

    <!-- Filter + Search -->
    <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      ${[['all','ทั้งหมด'],['late','🔴 Late'],['urgent','⚠ เร่งด่วน'],['active','กำลังทำ'],['done','✓ เสร็จ']].map(([k,l])=>
        `<button class="tab ${orderFilter===k?'active':''}" onclick="orderFilter='${k}';setTab('orders')">${l}</button>`
      ).join('')}
      <input type="text" placeholder="ค้นหา SO / Order / Material..." value="${orderSearch}"
        oninput="orderSearch=this.value;setTab('orders')"
        style="font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--bord2);background:var(--bg3);color:var(--txt);outline:none;width:220px;margin-left:auto">
      <span style="font-size:11px;color:var(--txt3)">แสดง ${rows.length} orders</span>

function kvaToTemplate(kva) {
  if (kva <= 75)   return 'tr.50kVA';
  if (kva <= 175)  return 'tr.160kVA';
  if (kva <= 350)  return 'tr.300KVA';
  if (kva <= 750)  return 'tr.630kVA';
  if (kva <= 1400) return 'tr.1000kVA';
  if (kva <= 2500) return 'tr.2000kVA';
  if (kva <= 4500) return 'tr.3500kVA';
  return 'tr.7000kVA';
}

// Decode Item Code → pick best product template + return decoded info
function itemCodeToProduct(item5, fallbackKva) {
  const decoded = (item5 && item5.length >= 8) ? decodeItemCode(item5) : null;
  const kva = decoded?.kva ? parseFloat(decoded.kva) : (fallbackKva || 0);
  const product = kvaToTemplate(kva || fallbackKva || 0);
  return { product, decoded, effectiveKva: kva || fallbackKva || 0 };
}

// Aggregate per-WC hours across all import rows
function calcImportWcHours(rows) {
  const wcMap = {}; // wc → { name, hrs }
  for (const r of rows) {
    const prod = PRODUCTS[r.product];
    if (!prod?.ops) continue;
    const qty = r.qty || 1;
    for (const op of prod.ops) {
      if (!wcMap[op.wc]) wcMap[op.wc] = { name: op.name, hrs: 0 };
      wcMap[op.wc].hrs += op.hrs * qty;
    }
  }
  return wcMap;
}

function fmtDateCell(v) {
  if (!v) return null;
  if (v instanceof Date) return v.toISOString().slice(0,10);
  const s = String(v);
  if (s.includes('-') && s.length>=10) return s.slice(0,10);
  if (s.includes('/')) {
    const p = s.split('/');
    if (p.length===3) return `${p[2].length===4?p[2]:'20'+p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  }
  return null;
}

function normalizeImportHeader(v) {
  return String(v || '').toLowerCase().replace(/[\s._\-:()[\]/\\]+/g, '');
}

function findImportColumn(headerRow, names, fallback) {
  if (!headerRow) return fallback;
  const targets = names.map(normalizeImportHeader);
  const idx = headerRow.findIndex(cell => targets.some(t => normalizeImportHeader(cell).includes(t)));
  return idx >= 0 ? idx : fallback;
}

function detectImportHeader(raw) {
  for (let i = 0; i < Math.min(raw.length, 30); i++) {
    const row = raw[i] || [];
    const normalized = row.map(normalizeImportHeader);
    const hasKva = normalized.some(h => h.includes('kva'));
    const hasQty = normalized.some(h => h.includes('qty') || h.includes('quantity') || h.includes('จำนวน'));
    const hasSO = normalized.some(h => h.includes('sap') || h.includes('so'));
    if (hasKva && (hasQty || hasSO)) return { rowIndex:i, row };
  }
  return null;
}

function handleExcelFile(file) {
  if (!file) return;
  importStatus = '⏳ กำลังอ่านไฟล์...';
  importRows   = [];
  importDone   = false;
  importMappingMode = '';
  setTab('import');

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const XLSX    = window.XLSX;
      if (!XLSX) { importStatus='❌ ยังโหลด SheetJS ไม่สำเร็จ รอสักครู่แล้วลองใหม่'; setTab('import'); return; }

      const wb      = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const shName  = wb.SheetNames[0];
      const ws      = wb.Sheets[shName];
      const raw     = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
      const headerInfo = detectImportHeader(raw);
      const headerRow  = headerInfo?.row || null;
      const cols = {
        planDate: findImportColumn(headerRow, ['date','plan date','วันที่'], 0),
        seq:      findImportColumn(headerRow, ['seq','no','ลำดับ'], 1),
        category: findImportColumn(headerRow, ['category','type','หมวด'], 2),
        sapSo:    findImportColumn(headerRow, ['sap so','sap','so'], 3),
        item5:    findImportColumn(headerRow, ['item5','item'], 4),
        comment:  findImportColumn(headerRow, ['comment','remark','หมายเหตุ'], 5),
        plant:    findImportColumn(headerRow, ['plant'], 6),
        kva:      findImportColumn(headerRow, ['kva'], 7),
        voltage:  findImportColumn(headerRow, ['voltage','volt'], 8),
        customer: findImportColumn(headerRow, ['customer','ลูกค้า'], 9),
        qty:      findImportColumn(headerRow, ['qty','quantity','จำนวน'], 11),
        testDate: findImportColumn(headerRow, ['test date','test'], 12),
        store:    findImportColumn(headerRow, ['store','กำหนดส่งสโตร์'], 15),
        due:      findImportColumn(headerRow, ['due so','due','deadline'], 16),
      };
      importMappingMode = headerInfo ? `Header mapping (row ${headerInfo.rowIndex + 1})` : 'Fixed column mapping';

      // Find data rows: row has a numeric sequence (col 1)
      let currentDate = null;
      const rows = [];
      const dataRows = headerInfo ? raw.slice(headerInfo.rowIndex + 1) : raw;
      for (const row of dataRows) {
        // Track date from col 0
        const d0 = row[cols.planDate];
        const fd = fmtDateCell(d0);
        if (fd) currentDate = fd;

        const seq = parseFloat(row[cols.seq]);
        if (!isNaN(seq) && seq > 0) {
          const kva = parseFloat(row[cols.kva]);
          const qty = parseInt(row[cols.qty]) || 1;
          if (!kva || kva <= 0) continue;

          // Deadline: prefer DUE SO (col 16), fallback store date (col 15)
          const due    = fmtDateCell(row[cols.due]);
          const store  = fmtDateCell(row[cols.store]);
          const dl     = (due && due !== '-') ? due : (store && store !== '-') ? store : null;

          // Clean SAP SO
          let so = String(row[cols.sapSo]||'').replace(/\.0$/,'').trim();
          if (so === 'null' || !so) so = '';

          rows.push({
            seq:       Math.round(seq),
            plan_date: currentDate,
            category:  String(row[cols.category]||'').trim() || 'หลัก',
            sap_so:    so,
            item5:     String(row[cols.item5]||'').trim(),
            comment:   String(row[cols.comment]||'').trim(),
            plant:     String(row[cols.plant]||'').trim(),
            kva,
            voltage:   String(row[cols.voltage]||'').trim(),
            customer:  String(row[cols.customer]||'').trim(),
            qty,
            test_date: fmtDateCell(row[cols.testDate]),
            deadline:  dl,
            // --- Item Code analysis ---
            ...(() => {
              const ic = itemCodeToProduct(String(row[cols.item5]||'').trim(), kva);
              const prod = PRODUCTS[ic.product];
              return {
                product:        ic.product,
                decoded:        ic.decoded,
                effectiveKva:   ic.effectiveKva,
                std_hrs_unit:   prod?.std_hrs || 0,
                total_hrs:      (prod?.std_hrs || 0) * qty,
              };
            })(),
          });
        }
      }

      importRows   = rows;
      importStatus = `✅ พบ ${rows.length} orders — ${importMappingMode} — ตรวจสอบแล้วกด "โหลดเข้าระบบ"`;
      importDone   = false;
      setTab('import');
    } catch(err) {
      importStatus = `❌ ข้อผิดพลาด: ${err.message}`;
      setTab('import');
    }
  };
  reader.readAsArrayBuffer(file);
}

function detectDeptFromWC(wc) {
  if (/^EE31/.test(wc)) return '31';
  if (/^EE32/.test(wc)) return '32';
  if (/^EE33/.test(wc)) return '33';
  if (/^EE34/.test(wc)) return '34';
  if (/^EE35/.test(wc)) return '35';
  if (/^EE36/.test(wc)) return '36';
  if (/^EE37/.test(wc)) return '37';
  if (/^EE4/.test(wc))  return '42';
  if (/^MP51/.test(wc)) return '51';
  if (/^MP52/.test(wc)) return '52';
  if (/^MP53/.test(wc)) return '53';
  if (/^MP54/.test(wc)) return '54';
  if (/^MP56/.test(wc)) return '56';
  if (/^PT/.test(wc))   return '37';
  return '';
}

let empImportHeader  = [];   // raw header row from file
let empImportRawRows = [];   // all raw data rows (for full-table preview)
let empImportColMap  = {};   // { iWC, iId, iName, iDept }

function handleEmpFile(file) {
  if (!file) return;
  empImportStatus = '⏳ กำลังอ่านไฟล์...';
  empImportRows = []; empImportHeader = []; empImportRawRows = []; empImportDone = false;
  setTab('import');
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const XLSX = window.XLSX;
      if (!XLSX) { empImportStatus='❌ SheetJS ยังไม่พร้อม'; setTab('import'); return; }
      const wb  = XLSX.read(e.target.result, {type:'array'});
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

      const nm = v => String(v||'').toLowerCase().replace(/[\s_\-\.\/()]+/g,'');

      // Keywords — แผนก removed from WC_KEYS (it's dept, not WC)
      const WC_KEYS   = ['wc','workcenter','หน่วยงาน','หน่วย','workctr','costcenter','work'];
      const NAME_KEYS = ['พนักงาน','firstname','ชื่อ','name','fullname','empname','ชื่อสกุล','ชื่อนามสกุล','employee'];
      const ID_KEYS     = ['id','empid','รหัส','personnel','empno','employeeid'];
      const DEPT_KEYS   = ['dept','department','แผนก','division','ฝ่าย'];
      const ACTIVE_KEYS = ['isactive','is_active','active','สถานะ','status'];

      let headerRow = null, dataStart = 0, detectNote = '';

      // Strategy 1: WC + Name
      for (let i=0; i<Math.min(raw.length,30); i++) {
        const n = (raw[i]||[]).map(nm);
        if (n.some(h=>WC_KEYS.some(k=>h.includes(k))) && n.some(h=>NAME_KEYS.some(k=>h.includes(k)))) {
          headerRow = raw[i]; dataStart = i+1; detectNote='(ตรวจพบ header อัตโนมัติ)'; break;
        }
      }
      // Strategy 2: Name + ID
      if (!headerRow) {
        for (let i=0; i<Math.min(raw.length,30); i++) {
          const n = (raw[i]||[]).map(nm);
          if (n.some(h=>NAME_KEYS.some(k=>h.includes(k))) && n.some(h=>ID_KEYS.some(k=>h.includes(k)))) {
            headerRow = raw[i]; dataStart = i+1; detectNote='(พบ Name+ID)'; break;
          }
        }
      }
      // Strategy 3: first row with 3+ text strings
      if (!headerRow) {
        for (let i=0; i<Math.min(raw.length,10); i++) {
          const strs = (raw[i]||[]).filter(v=>v!==null&&String(v).trim()!=='');
          if (strs.length >= 3 && strs.every(v=>isNaN(parseFloat(String(v))))) {
            headerRow = raw[i]; dataStart = i+1; detectNote='(ใช้ row แรกที่มีข้อความ)'; break;
          }
        }
      }
      // Strategy 4: row 0
      if (!headerRow && raw.length > 0) { headerRow = raw[0]; dataStart = 1; detectNote='(ใช้ row 1)'; }

      const findCol = (keys, fallback) => {
        if (!headerRow) return fallback;
        const idx = headerRow.findIndex(h => keys.some(k => nm(h).includes(k)));
        return idx >= 0 ? idx : fallback;
      };

      const iWC     = findCol(WC_KEYS, 0);
      const iId     = findCol(ID_KEYS, -1);
      const iName   = findCol(NAME_KEYS, -1);
      const iDept   = findCol(DEPT_KEYS, -1);
      const iActive = findCol(ACTIVE_KEYS, -1);
      empImportColMap = { iWC, iId, iName, iDept, iActive };

      const colLabel = i => i >= 0 ? (headerRow?.[i] ? `"${headerRow[i]}"[col${i+1}]` : `col${i+1}`) : '—';
      const mappingNote = `WC=${colLabel(iWC)} · Name=${colLabel(iName)} · ID=${colLabel(iId)} · Dept=${colLabel(iDept)} · Active=${colLabel(iActive)}`;

      // Store raw header + all data rows for full-table preview
      empImportHeader  = headerRow || [];
      const dataSlice  = raw.slice(dataStart);
      empImportRawRows = dataSlice.filter(r => r && !r.every(v=>v===null||String(v).trim()===''));

      // Build mapped rows (require WC)
      const rows = [];
      for (const row of empImportRawRows) {
        const wc   = String(row[iWC]  ||'').trim().toUpperCase();
        const name = iName >= 0 ? String(row[iName]||'').trim() : '';
        if (!wc) continue;
        // Parse is_active: true if column missing, else parse value
        let is_active = true;
        if (iActive >= 0 && row[iActive] !== null && row[iActive] !== undefined) {
          const v = String(row[iActive]).trim().toLowerCase();
          is_active = (v === 'true' || v === '1' || v === 'yes' || v === 'active' || v === 'y');
        }
        rows.push({
          wc,
          empId:     iId   >= 0 ? String(row[iId]  ||'').replace(/\.0$/,'').trim() : '',
          empName:   name || `(row ${rows.length+1})`,
          dept:      iDept >= 0 ? (String(row[iDept]||'').trim() || detectDeptFromWC(wc)) : detectDeptFromWC(wc),
          is_active,
          _raw: row,
        });
      }

      empImportRows = rows;
      if (rows.length) {
        const wcCount  = [...new Set(rows.map(r=>r.wc))].length;
        const actCount = rows.filter(r=>r.is_active).length;
        empImportStatus = `✅ พบ ${rows.length} แถว (Active ${actCount} · Inactive ${rows.length-actCount}) จาก ${wcCount} WCs ${detectNote}\n📋 ${mappingNote}`;
      } else {
        const hdrPreview = (headerRow||[]).filter(Boolean).slice(0,8).join(' | ');
        empImportStatus = `⚠ ไม่พบข้อมูล ${detectNote}\nHeader ที่พบ: ${hdrPreview||'ไม่มี'}\n💡 ตรวจสอบว่ามีคอลัมน์ WC และ ชื่อพนักงาน`;
      }
      empImportDone = false;
      setTab('import');
    } catch(err) { empImportStatus=`❌ ${err.message}`; setTab('import'); }
  };
  reader.readAsArrayBuffer(file);
}

function loadEmpToSystem() {
  if (!empImportRows.length) return;
  const wcSet = [...new Set(empImportRows.map(r=>r.wc))];
  if (!window.confirm(`โหลด ${empImportRows.length} คน จาก ${wcSet.length} WCs เข้าระบบ?\n\nจะแทนที่ข้อมูลพนักงานที่มีอยู่ทั้งหมด (${Object.values(EMP_DIR).reduce((s,d)=>s+d.employees.length,0)} คน)`)) return;

  // Build new EMP_DIR (group by WC)
  const newDir = {};
  for (const r of empImportRows) {
    if (!newDir[r.wc]) newDir[r.wc] = { dept: r.dept, employees: [] };
    newDir[r.wc].employees.push({ name: r.empName, id: r.empId, is_active: r.is_active });
    if (r.dept && !newDir[r.wc].dept) newDir[r.wc].dept = r.dept;
  }
  // Replace EMP_DIR in-place (it's a const object)
  Object.keys(EMP_DIR).forEach(k => delete EMP_DIR[k]);
  Object.assign(EMP_DIR, newDir);

  invalidateLoadCache();
  empImportDone   = true;
  const actCnt = empImportRows.filter(r=>r.is_active).length;
  empImportStatus = `🎉 โหลดสำเร็จ! Active ${actCnt} คน · Inactive ${empImportRows.length-actCnt} คน จาก ${wcSet.length} WCs`;
  setTab('import');
}

function handleCatFile(file) {
  if (!file) return;
  catImportStatus = '⏳ กำลังอ่านไฟล์...';
  catImportRows = []; catImportDone = false;
  setTab('import');
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const XLSX = window.XLSX;
      if (!XLSX) { catImportStatus='❌ SheetJS ยังไม่พร้อม'; setTab('import'); return; }
      const wb  = XLSX.read(e.target.result, {type:'array'});
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

      let headerRow = null, dataStart = 0;
      for (let i=0; i<Math.min(raw.length,15); i++) {
        const norm = (raw[i]||[]).map(v=>String(v||'').toLowerCase().replace(/[\s_-]/g,''));
        if (norm.some(h=>h.includes('kva')) && norm.some(h=>h.includes('std')||h.includes('volt')||h.includes('type'))) {
          headerRow = raw[i]; dataStart = i+1; break;
        }
      }
      const findCol = (keys) => {
        if (!headerRow) return -1;
        return headerRow.findIndex(h=>keys.some(k=>String(h||'').toLowerCase().replace(/[\s_-]/g,'').includes(k)));
      };
      const iId     = findCol(['id','no','รหัส'])         !== -1 ? findCol(['id','no','รหัส'])         : 0;
      const iKva    = findCol(['kva'])                     !== -1 ? findCol(['kva'])                     : 1;
      const iPhase  = findCol(['phase','เฟส'])            !== -1 ? findCol(['phase','เฟส'])            : 2;
      const iVec    = findCol(['vector','vec','group'])    !== -1 ? findCol(['vector','vec','group'])    : 3;
      const iVolt   = findCol(['volt','แรงดัน'])           !== -1 ? findCol(['volt','แรงดัน'])           : 4;
      const iType   = findCol(['type','ชนิด'])            !== -1 ? findCol(['type','ชนิด'])            : 5;
      const iStd    = findCol(['std','hrs','ชั่วโมง'])    !== -1 ? findCol(['std','hrs','ชั่วโมง'])    : 6;
      const iOrders = findCol(['order','qty','จำนวน'])    !== -1 ? findCol(['order','qty','จำนวน'])    : 7;
      const iTmpl   = findCol(['template','product','tmpl'])!== -1 ? findCol(['template','product','tmpl']): 8;
      const iDesc   = findCol(['desc','remark','detail'])  !== -1 ? findCol(['desc','remark','detail'])  : 9;

      const rows = []; let idx = 1;
      for (const row of (headerRow ? raw.slice(dataStart) : raw)) {
        if (!row) continue;
        const kva = parseFloat(row[iKva]);
        if (!kva || kva <= 0) continue;
        const tmpl = String(row[iTmpl]||'').trim() || kvaToTemplate(kva);
        rows.push({
          id:       String(row[iId]||'').trim() || `C${String(idx).padStart(3,'0')}`,
          kva,
          phase:    String(row[iPhase]||'3ph').trim().toLowerCase(),
          vector:   String(row[iVec]  ||'').trim(),
          voltage:  String(row[iVolt] ||'').trim(),
          type:     String(row[iType] ||'Oil-Immersed').trim(),
          std:      parseFloat(row[iStd])    || (PRODUCTS[tmpl]?.std_hrs || 0),
          orders:   parseInt(row[iOrders])   || 0,
          template: tmpl,
          desc:     String(row[iDesc]||'').trim(),
        });
        idx++;
      }
      catImportRows   = rows;
      catImportStatus = rows.length
        ? `✅ พบ ${rows.length} รุ่น — kVA ${Math.min(...rows.map(r=>r.kva))}–${Math.max(...rows.map(r=>r.kva))} — ตรวจสอบแล้วกด "โหลดเข้าระบบ"`
        : '⚠ ไม่พบข้อมูล — ตรวจสอบ header: kVA, Voltage, STD';
      catImportDone = false;
      setTab('import');
    } catch(err) { catImportStatus=`❌ ${err.message}`; setTab('import'); }
  };
  reader.readAsArrayBuffer(file);
}

function loadCatToSystem() {
  if (!catImportRows.length) return;
  if (!window.confirm(`โหลด ${catImportRows.length} รุ่น เข้า Catalog?\n\nจะแทนที่ Catalog ที่มีอยู่ทั้งหมด (${CATALOG.length} รุ่น)`)) return;
  CATALOG.length = 0;
  catImportRows.forEach(r => CATALOG.push(r));

  catImportStatus = `🎉 โหลดสำเร็จ! ${catImportRows.length} รุ่น เข้า Catalog แล้ว`;
  setTab('import');
}

// ── SAP Production Order Import ───────────────────────────────
let sapImportRows   = [];   // raw operation rows
let sapImportStatus = '';
let sapImportDone   = false;

const SAP_COLS = [
  { key:'id',            labels:['id'] },
  { key:'orderNumber',   labels:['ordernumber','order'] },
  { key:'plant',         labels:['productionplant','plant'] },
  { key:'salesOrder',    labels:['salesorder','sapso','so'] },
  { key:'materialOrder', labels:['materialorder','material'] },
  { key:'materialDesc',  labels:['materialdescription','materialdesc','desc'] },
  { key:'routingNo',     labels:['routingno','routing'] },
  { key:'reservationNo', labels:['reservationnumber','reservation'] },
  { key:'qty',           labels:['targetquantity','qty','quantity'] },
  { key:'unit',          labels:['unitorder','unit'] },
  { key:'orderType',     labels:['ordertype','type'] },
  { key:'startDate',     labels:['basicstartdate','startdate','start'] },
  { key:'finishDate',    labels:['basicfinishdate','finishdate','finish','deadline'] },
  { key:'timeStamp',     labels:['timestamp','time'] },
  { key:'counter',       labels:['counter'] },
  { key:'opNumber',      labels:['operationnumber','opnumber','op'] },
  { key:'opName',        labels:['ltxa1','opname','operationname','operation'] },
  { key:'wc',            labels:['workcenter','wc'] },
  { key:'std3',          labels:['stdactivitytype3','std3','activity3'] },
  { key:'std4',          labels:['stdactivitytype4','std4','activity4'] },
  { key:'std5',          labels:['stdactivitytype5','std5','activity5'] },
  { key:'std6',          labels:['stdactivitytype6','std6','activity6'] },
  { key:'createdAt',     labels:['สร้างเมื่อ','createdat','created'] },
  { key:'confirmStart',  labels:['confirm_start','confirmstart'] },
  { key:'confirmEnd',    labels:['confirm_end','confirmend'] },
  { key:'isConfirm',     labels:['is_confirm','isconfirm','confirm'] },
];

function handleSapFile(file) {
  if (!file) return;
  sapImportStatus = '⏳ กำลังอ่านไฟล์...';
  sapImportRows = []; sapImportDone = false;
  setTab('import');
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const XLSX = window.XLSX;
      if (!XLSX) { sapImportStatus='❌ SheetJS ยังไม่พร้อม'; setTab('import'); return; }
      const wb  = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
      if (!raw.length) { sapImportStatus='⚠ ไฟล์ว่าง'; setTab('import'); return; }

      const nm = v => String(v||'').toLowerCase().replace(/[\s_\-\.]+/g,'');

      // Find header row — look for a row containing 'ordernumber' or 'workcenter'
      let headerRow = null, dataStart = 0;
      for (let i=0; i<Math.min(raw.length,10); i++) {
        const normed = (raw[i]||[]).map(nm);
        if (normed.some(h=>h.includes('ordernumber')||h.includes('workcenter')||h.includes('salesorder'))) {
          headerRow = raw[i]; dataStart = i+1; break;
        }
      }
      if (!headerRow) { headerRow = raw[0]; dataStart = 1; }

      // Build column index map
      const colIdx = {};
      SAP_COLS.forEach(({key, labels}) => {
        const idx = headerRow.findIndex(h => labels.some(l => nm(h).includes(l)));
        colIdx[key] = idx >= 0 ? idx : -1;
      });

      const fmtD = v => {
        if (!v) return '';
        if (v instanceof Date) return v.toISOString().slice(0,10);
        const s = String(v);
        if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);
        if (s.includes('/')) {
          const p = s.split('/');
          if (p.length===3) return `${p[2].length===4?p[2]:'20'+p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
        }
        return s;
      };
      const g = (row, key) => {
        const i = colIdx[key];
        return i >= 0 && row[i] != null ? String(row[i]).replace(/\.0$/,'').trim() : '';
      };

      const rows = [];
      for (const row of raw.slice(dataStart)) {
        if (!row || row.every(v=>v===null||String(v).trim()==='')) continue;
        const orderNum = g(row,'orderNumber');
        if (!orderNum) continue;
        rows.push({
          id:           g(row,'id'),
          orderNumber:  orderNum,
          plant:        g(row,'plant'),
          salesOrder:   g(row,'salesOrder'),
          materialOrder:g(row,'materialOrder'),
          materialDesc: g(row,'materialDesc'),
          routingNo:    g(row,'routingNo'),
          reservationNo:g(row,'reservationNo'),
          qty:          g(row,'qty'),
          unit:         g(row,'unit'),
          orderType:    g(row,'orderType'),
          startDate:    fmtD(row[colIdx['startDate']]),
          finishDate:   fmtD(row[colIdx['finishDate']]),
          timeStamp:    g(row,'timeStamp'),
          counter:      g(row,'counter'),
          opNumber:     g(row,'opNumber'),
          opName:       g(row,'opName'),
          wc:           g(row,'wc'),
          std3:         parseFloat(g(row,'std3'))||0,
          std4:         parseFloat(g(row,'std4'))||0,
          std5:         parseFloat(g(row,'std5'))||0,
          std6:         parseFloat(g(row,'std6'))||0,
          createdAt:    g(row,'createdAt'),
          confirmStart: fmtD(row[colIdx['confirmStart']]),
          confirmEnd:   fmtD(row[colIdx['confirmEnd']]),
          isConfirm:    g(row,'isConfirm'),
        });
      }

      sapImportRows   = rows;
      const orders    = [...new Set(rows.map(r=>r.orderNumber))];
      const confirmed = rows.filter(r=>r.isConfirm&&r.isConfirm!=='0'&&r.isConfirm.toLowerCase()!=='false'&&r.isConfirm!=='').length;
      sapImportStatus = rows.length
        ? `✅ พบ ${rows.length} operations · ${orders.length} orders · confirm แล้ว ${confirmed} ops`
        : '⚠ ไม่พบข้อมูล — ตรวจสอบว่าไฟล์มีคอลัมน์ OrderNumber หรือ WorkCenter';
      sapImportDone = false;
      setTab('import');
    } catch(err) { sapImportStatus=`❌ ${err.message}`; setTab('import'); }
  };
  reader.readAsArrayBuffer(file);
}

      </thead>
      <tbody>${rows_html}</tbody>

    <!-- Instructions -->
    <div class="card" style="margin-top:14px;background:rgba(91,142,240,.04);border-color:rgba(91,142,240,.2)">
      <div class="card-title" style="color:var(--blue)">วิธีใช้</div>
      <div style="font-size:12px;color:var(--txt2);line-height:1.9">
        <div><strong>1.</strong> เปิดไฟล์ Excel แผนลงคอยล์ (ชื่อไฟล์ตามวันที่) — ต้องมี Sheet ชื่อ <span style="font-family:var(--mono)">AAA</span></div>
        <div><strong>2.</strong> ลากวางหรือคลิกเลือกไฟล์ด้านบน</div>

// ── Router ────────────────────────────────────────────────────
const THEMES = ['light','dark','blue','green','warm'];
function setTheme(name, dotEl) {
  const html = document.documentElement;
  THEMES.forEach(t => html.classList.remove('theme-'+t));
  if (name !== 'light') html.classList.add('theme-'+name);
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
  if (dotEl) dotEl.classList.add('active');
  try { localStorage.setItem('ekarat-theme', name); } catch(e){}
}
(function(){
  try {
    const saved = localStorage.getItem('ekarat-theme');
    if (saved && saved !== 'light') {
      document.documentElement.classList.add('theme-'+saved);
      setTimeout(()=>{
        const dots = document.querySelectorAll('.theme-dot');
        const idx  = THEMES.indexOf(saved);
        dots.forEach(d=>d.classList.remove('active'));
        if(dots[idx]) dots[idx].classList.add('active');
      },50);
    }
  } catch(e){}
})();

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.getAttribute('onclick') === `setTab('${tab}')`);
  });
  const body = document.getElementById('body-root');
  const renderers = { simulate: renderSimulate, import: renderImport, orders: renderOrders, catalog: renderCatalog, employees: renderEmployees, timedash: renderTimeDashboard, dept: renderDept, load: renderLoad, gantt: renderGantt, plan: renderPlan, capacity: renderCapacityPlan, itemdecode: renderItemDecoder, transcode: renderTransCode, calendar: renderCalendar, settings: renderSettings };
  body.innerHTML = renderers[tab]();
  if (tab === 'simulate') onSimChange();
  if (tab === 'timedash') setTimeout(()=>{ if(document.getElementById('op-table-wrap')) renderOpTable(); }, 50);
  if (tab === 'calendar') {
    calViewYear  = new Date().getFullYear();
    calViewMonth = new Date().getMonth();
    buildCalGrid();
  }
}

// Clock
setInterval(() => {
  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('th-TH',{hour12:false});
}, 1000);

setTab('simulate');
loadAllFromBackend();
